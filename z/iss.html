<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国际空间站轨道演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: #d0e0f8;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }

        .control-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(5, 15, 30, 0.95);
            border: 1px solid rgba(60, 140, 220, 0.4);
            border-radius: 16px;
            padding: 20px;
            z-index: 100;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 40px rgba(0, 60, 140, 0.4);
            width: 280px;
        }

        .control-panel h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #fff;
        }

        .control-panel .subtitle {
            font-size: 11px;
            color: #5a80a8;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 10px;
            color: #4a70a0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 14px 0 10px;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .btn {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid rgba(60, 140, 220, 0.35);
            border-radius: 8px;
            background: rgba(20, 45, 80, 0.6);
            color: #a0c8f0;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(30, 60, 100, 0.8);
        }

        .btn.active {
            background: linear-gradient(135deg, #1a5090, #0d2850);
            border-color: #4090e0;
            color: #fff;
        }

        .slider-container {
            margin: 12px 0;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .slider-label span {
            font-size: 11px;
            color: #6090c0;
        }

        .slider-label .value {
            color: #40a0ff;
            font-weight: 600;
        }

        .slider {
            width: 100%;
            height: 5px;
            -webkit-appearance: none;
            appearance: none;
            background: linear-gradient(90deg, #0a2040, #1a4070);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #40a0ff, #2080d0);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(64, 160, 255, 0.6);
        }

        .info-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(5, 15, 30, 0.95);
            border: 1px solid rgba(60, 140, 220, 0.4);
            border-radius: 16px;
            padding: 18px;
            z-index: 100;
            backdrop-filter: blur(12px);
            min-width: 220px;
        }

        .info-panel h2 {
            font-size: 13px;
            color: #60a0d0;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(60, 140, 220, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-panel h2::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #40ff90;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
        }

        .info-row .label {
            color: #5080a0;
            font-size: 11px;
        }

        .info-row .value {
            color: #c0d8f0;
            font-size: 12px;
            font-weight: 500;
        }

        .info-row .value.highlight {
            color: #40ffa0;
        }

        .stats-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(5, 15, 30, 0.95);
            border: 1px solid rgba(60, 140, 220, 0.4);
            border-radius: 12px;
            padding: 14px 18px;
            z-index: 100;
        }

        .stats-title {
            font-size: 10px;
            color: #4a70a0;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px 20px;
        }

        .stat-item {
            font-size: 11px;
        }

        .stat-item .stat-label {
            color: #5080a0;
        }

        .stat-item .stat-value {
            color: #a0c8f0;
            font-weight: 500;
        }

        .legend {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(5, 15, 30, 0.95);
            border: 1px solid rgba(60, 140, 220, 0.35);
            border-radius: 12px;
            padding: 12px 16px;
            z-index: 100;
        }

        .legend-title {
            font-size: 10px;
            color: #4a70a0;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
            font-size: 11px;
            color: #8098b0;
        }

        .legend-color {
            width: 14px;
            height: 3px;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="control-panel">
        <h1>国际空间站</h1>
        <div class="subtitle">International Space Station (ISS)</div>
        
        <div class="section-title">视角控制</div>
        <div class="btn-group">
            <button class="btn active" id="viewFree">自由视角</button>
            <button class="btn" id="viewFollow">跟随ISS</button>
        </div>

        <div class="section-title">运行速度</div>
        <div class="slider-container">
            <div class="slider-label">
                <span>时间倍率</span>
                <span class="value" id="speedValue">1x</span>
            </div>
            <input type="range" class="slider" id="speedSlider" min="0" max="10" value="1" step="0.5">
        </div>

        <div class="section-title">显示选项</div>
        <div class="btn-group">
            <button class="btn active" id="toggleOrbit">轨道线</button>
            <button class="btn active" id="toggleLabel">标签</button>
            <button class="btn active" id="toggleCoverage">覆盖范围</button>
        </div>
        <div class="btn-group">
            <button class="btn active" id="toggleClouds">云层</button>
            <button class="btn" id="toggleNight">夜间灯光</button>
        </div>
    </div>

    <div class="info-panel">
        <h2>ISS 实时状态</h2>
        <div class="info-row">
            <span class="label">当前位置</span>
            <span class="value highlight" id="currentPos">0°N, 0°E</span>
        </div>
        <div class="info-row">
            <span class="label">轨道高度</span>
            <span class="value">~408 km</span>
        </div>
        <div class="info-row">
            <span class="label">运行速度</span>
            <span class="value">~7.66 km/s</span>
        </div>
        <div class="info-row">
            <span class="label">轨道周期</span>
            <span class="value">~92.68 分钟</span>
        </div>
        <div class="info-row">
            <span class="label">轨道倾角</span>
            <span class="value">51.6°</span>
        </div>
        <div class="info-row">
            <span class="label">已绕行圈数</span>
            <span class="value highlight" id="orbitCount">0</span>
        </div>
    </div>

    <div class="stats-panel">
        <div class="stats-title">ISS 数据</div>
        <div class="stats-grid">
            <div class="stat-item">
                <span class="stat-label">质量: </span>
                <span class="stat-value">~420,000 kg</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">尺寸: </span>
                <span class="stat-value">109m × 73m</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">乘员: </span>
                <span class="stat-value">通常6人</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">发射: </span>
                <span class="stat-value">1998年</span>
            </div>
        </div>
    </div>

    <div class="legend">
        <div class="legend-title">图例</div>
        <div class="legend-item">
            <div class="legend-color" style="background: #40e0a0"></div>
            <span>ISS轨道</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #ffa040; opacity: 0.3"></div>
            <span>通信覆盖范围</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #ff5050"></div>
            <span>赤道</span>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 常量
        const EARTH_RADIUS = 10;
        const ISS_ORBIT_RADIUS = EARTH_RADIUS * 1.064;
        const ORBITAL_INCLINATION = 51.6 * Math.PI / 180;

        // 全局变量
        let scene, camera, renderer, controls;
        let earth, atmosphere, clouds;
        let iss, issOrbitGroup, issOrbitLine;
        let coverageCircle;
        let currentAngle = 0;
        let orbitCount = 0;
        let timeScale = 1;
        let followMode = false;
        let showOrbit = true, showLabel = true, showCoverage = true, showClouds = true, showNight = false;
        let issLabel;
        let clock = new THREE.Clock();

        const container = document.getElementById('canvas-container');

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020408);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(25, 15, 25);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 15;
            controls.maxDistance = 100;

            createStarfield();
            createEarth();
            createClouds();
            createISS();
            createOrbitPath();
            createLights();
            setupEventListeners();
        }

        // 程序生成地球纹理
        function generateEarthTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');

            // 海洋渐变
            const oceanGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            oceanGrad.addColorStop(0, '#0a2540');
            oceanGrad.addColorStop(0.3, '#0d3a5c');
            oceanGrad.addColorStop(0.5, '#0f4570');
            oceanGrad.addColorStop(0.7, '#0d3a5c');
            oceanGrad.addColorStop(1, '#0a2540');
            ctx.fillStyle = oceanGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 简化的陆地块数据 [x, y, width, height, color]
            const continents = [
                // 北美
                {x: 150, y: 180, w: 350, h: 250, color: '#2d5a3d'},
                {x: 180, y: 150, w: 280, h: 150, color: '#3d6a4d'},
                {x: 200, y: 350, w: 150, h: 100, color: '#4a7a5a'},
                // 南美
                {x: 380, y: 480, w: 120, h: 280, color: '#2a6a3a'},
                {x: 350, y: 520, w: 100, h: 200, color: '#3a7a4a'},
                // 欧洲
                {x: 900, y: 180, w: 200, h: 120, color: '#4a7050'},
                {x: 920, y: 200, w: 150, h: 100, color: '#5a8060'},
                // 非洲
                {x: 920, y: 320, w: 200, h: 300, color: '#8a7a40'},
                {x: 950, y: 350, w: 160, h: 250, color: '#9a8a50'},
                {x: 900, y: 500, w: 120, h: 100, color: '#7a6a30'},
                // 亚洲
                {x: 1100, y: 150, w: 500, h: 280, color: '#3a6545'},
                {x: 1150, y: 180, w: 400, h: 200, color: '#4a7555'},
                {x: 1300, y: 280, w: 200, h: 150, color: '#5a8565'},
                // 澳大利亚
                {x: 1500, y: 520, w: 200, h: 150, color: '#9a7040'},
                {x: 1520, y: 540, w: 160, h: 120, color: '#aa8050'},
                // 格陵兰
                {x: 550, y: 80, w: 100, h: 100, color: '#e8e8e8'},
                // 南极
                {x: 0, y: 920, w: 2048, h: 104, color: '#e0e8f0'}
            ];

            continents.forEach(c => {
                ctx.fillStyle = c.color;
                // 使用圆角矩形模拟陆地形状
                roundRect(ctx, c.x, c.y, c.w, c.h, 20);
            });

            // 添加地形纹理细节
            for (let i = 0; i < 5000; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 3 + 1;
                ctx.fillStyle = `rgba(${30 + Math.random() * 40}, ${60 + Math.random() * 50}, ${40 + Math.random() * 40}, 0.3)`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }

            // 添加山脉
            for (let i = 0; i < 500; i++) {
                const x = Math.random() * canvas.width;
                const y = 100 + Math.random() * 300;
                ctx.fillStyle = `rgba(80, 70, 50, ${Math.random() * 0.3})`;
                ctx.beginPath();
                ctx.arc(x, y, Math.random() * 5 + 2, 0, Math.PI * 2);
                ctx.fill();
            }

            return new THREE.CanvasTexture(canvas);
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
            ctx.fill();
        }

        // 生成云层纹理
        function generateCloudsTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = 'rgba(0,0,0,0)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 云层
            for (let i = 0; i < 300; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const w = Math.random() * 150 + 50;
                const h = Math.random() * 30 + 10;
                const opacity = Math.random() * 0.4 + 0.1;

                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.beginPath();
                ctx.ellipse(x, y, w, h, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            return new THREE.CanvasTexture(canvas);
        }

        // 生成夜间灯光纹理
        function generateNightTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 城市灯光集群
            const cityRegions = [
                {x: 250, y: 200, density: 80},  // 北美东部
                {x: 180, y: 250, density: 40},  // 北美西部
                {x: 950, y: 200, density: 70},  // 欧洲
                {x: 1150, y: 220, density: 60}, // 东亚
                {x: 1300, y: 280, density: 50}, // 日本韩国
                {x: 1050, y: 350, density: 30}, // 中东
                {x: 700, y: 300, density: 25},  // 印度
                {x: 1550, y: 500, density: 20}, // 澳大利亚
                {x: 400, y: 500, density: 30},  // 巴西
                {x: 850, y: 250, density: 15},  // 北非
            ];

            cityRegions.forEach(region => {
                for (let i = 0; i < region.density; i++) {
                    const x = region.x + (Math.random() - 0.5) * 200;
                    const y = region.y + (Math.random() - 0.5) * 150;
                    const size = Math.random() * 6 + 2;
                    
                    const gradient = ctx.createRadialGradient(x, y, 0, x, y, size * 3);
                    gradient.addColorStop(0, 'rgba(255, 220, 150, 0.9)');
                    gradient.addColorStop(0.5, 'rgba(255, 180, 100, 0.4)');
                    gradient.addColorStop(1, 'rgba(255, 150, 50, 0)');
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(x - size * 3, y - size * 3, size * 6, size * 6);
                }
            });

            return new THREE.CanvasTexture(canvas);
        }

        function createStarfield() {
            const starCount = 4000;
            const positions = new Float32Array(starCount * 3);
            
            for (let i = 0; i < starCount; i++) {
                const radius = 200 + Math.random() * 200;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = radius * Math.cos(phi);
            }
            
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            scene.add(new THREE.Points(geometry, new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.6,
                transparent: true,
                opacity: 0.7
            })));
        }

        function createEarth() {
            const earthGeom = new THREE.SphereGeometry(EARTH_RADIUS, 128, 64);
            
            // 生成纹理
            const dayMap = generateEarthTexture();
            const nightMap = generateNightTexture();
            
            const earthMat = new THREE.ShaderMaterial({
                uniforms: {
                    uDayMap: { value: dayMap },
                    uNightMap: { value: nightMap },
                    uSunDir: { value: new THREE.Vector3(1, 0.3, 0.5).normalize() },
                    uShowNight: { value: 0.0 }
                },
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    varying vec3 vPosition;
                    
                    void main() {
                        vUv = uv;
                        vNormal = normalize(normalMatrix * normal);
                        vPosition = (modelMatrix * vec4(position, 1.0)).xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform sampler2D uDayMap;
                    uniform sampler2D uNightMap;
                    uniform vec3 uSunDir;
                    uniform float uShowNight;
                    
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    varying vec3 vPosition;
                    
                    void main() {
                        vec3 lightDir = normalize(uSunDir);
                        float diff = max(dot(vNormal, lightDir), 0.0);
                        
                        vec4 dayColor = texture2D(uDayMap, vUv);
                        vec4 nightColor = texture2D(uNightMap, vUv);
                        
                        // 光照
                        float dayFactor = smoothstep(-0.1, 0.3, diff);
                        
                        vec3 finalColor = dayColor.rgb * (diff * 0.85 + 0.15);
                        
                        // 高光（海洋区域）
                        float oceanMask = 1.0 - step(0.3, dayColor.r + dayColor.g - dayColor.b);
                        vec3 viewDir = normalize(cameraPosition - vPosition);
                        vec3 halfDir = normalize(lightDir + viewDir);
                        float spec = pow(max(dot(vNormal, halfDir), 0.0), 48.0);
                        finalColor += vec3(0.5, 0.6, 0.7) * spec * oceanMask * dayFactor;
                        
                        // 夜间灯光
                        float nightFactor = (1.0 - dayFactor) * uShowNight;
                        finalColor = mix(finalColor, nightColor.rgb * 2.0, nightFactor);
                        
                        gl_FragColor = vec4(finalColor, 1.0);
                    }
                `
            });
            
            earth = new THREE.Mesh(earthGeom, earthMat);
            scene.add(earth);

            // 大气层
            const atmoGeom = new THREE.SphereGeometry(EARTH_RADIUS * 1.02, 64, 64);
            const atmoMat = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    void main() {
                        float intensity = pow(0.7 - dot(vNormal, vec3(0, 0, 1)), 2.0);
                        vec3 color = vec3(0.3, 0.6, 1.0) * intensity;
                        gl_FragColor = vec4(color, intensity * 0.4);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide,
                depthWrite: false
            });
            
            atmosphere = new THREE.Mesh(atmoGeom, atmoMat);
            scene.add(atmosphere);

            // 赤道线
            const eqPoints = [];
            for (let i = 0; i <= 128; i++) {
                const angle = (i / 128) * Math.PI * 2;
                eqPoints.push(
                    Math.cos(angle) * EARTH_RADIUS * 1.005,
                    0,
                    Math.sin(angle) * EARTH_RADIUS * 1.005
                );
            }
            const eqGeom = new THREE.BufferGeometry();
            eqGeom.setAttribute('position', new THREE.Float32BufferAttribute(eqPoints, 3));
            scene.add(new THREE.Line(eqGeom, new THREE.LineBasicMaterial({ 
                color: 0xff5050, 
                transparent: true, 
                opacity: 0.4 
            })));
        }

        function createClouds() {
            const cloudsMap = generateCloudsTexture();
            const cloudGeom = new THREE.SphereGeometry(EARTH_RADIUS * 1.015, 64, 64);
            const cloudMat = new THREE.MeshBasicMaterial({
                map: cloudsMap,
                transparent: true,
                opacity: 0.35,
                depthWrite: false,
                blending: THREE.NormalBlending
            });
            
            clouds = new THREE.Mesh(cloudGeom, cloudMat);
            scene.add(clouds);
        }

        function createISS() {
            issOrbitGroup = new THREE.Group();
            issOrbitGroup.rotation.x = ORBITAL_INCLINATION;
            scene.add(issOrbitGroup);

            iss = new THREE.Group();

            // 主舱段
            const moduleMat = new THREE.MeshStandardMaterial({ 
                color: 0xdddddd,
                metalness: 0.8,
                roughness: 0.2
            });
            
            const mainModule = new THREE.Mesh(
                new THREE.CylinderGeometry(0.18, 0.18, 1.0, 12),
                moduleMat
            );
            mainModule.rotation.z = Math.PI / 2;
            iss.add(mainModule);

            const habModule = new THREE.Mesh(
                new THREE.CylinderGeometry(0.15, 0.15, 0.8, 10),
                moduleMat
            );
            habModule.rotation.z = Math.PI / 2;
            habModule.position.x = 0.6;
            iss.add(habModule);

            const labModule = new THREE.Mesh(
                new THREE.CylinderGeometry(0.12, 0.12, 0.7, 10),
                moduleMat
            );
            labModule.rotation.z = Math.PI / 2;
            labModule.position.x = -0.6;
            iss.add(labModule);

            // 太阳能电池板支架
            const trussMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.6 });
            const truss = new THREE.Mesh(new THREE.BoxGeometry(3.0, 0.06, 0.06), trussMat);
            iss.add(truss);

            // 太阳能电池板
            const panelMat = new THREE.MeshStandardMaterial({ 
                color: 0x1a3a6a,
                metalness: 0.95,
                roughness: 0.1
            });

            for (let i = -1; i <= 1; i += 2) {
                for (let j = -1; j <= 1; j += 2) {
                    const panel = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.03, 0.5), panelMat);
                    panel.position.set(i * 0.8, j * 0.3, 0);
                    iss.add(panel);
                }
            }

            // 散热器
            const radMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
            for (let i = -1; i <= 1; i += 2) {
                const rad = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.02, 0.18), radMat);
                rad.position.set(i * 1.3, 0.12, 0);
                iss.add(rad);
            }

            iss.position.x = ISS_ORBIT_RADIUS;
            issOrbitGroup.add(iss);

            // ISS标签
            const labelCanvas = document.createElement('canvas');
            labelCanvas.width = 256;
            labelCanvas.height = 64;
            const ctx = labelCanvas.getContext('2d');
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#000';
            ctx.shadowBlur = 4;
            ctx.fillStyle = '#fff';
            ctx.fillText('ISS', 128, 32);
            
            issLabel = new THREE.Sprite(new THREE.SpriteMaterial({ 
                map: new THREE.CanvasTexture(labelCanvas), 
                transparent: true,
                depthTest: false
            }));
            issLabel.scale.set(2.5, 0.6, 1);
            issLabel.position.set(iss.position.x, 0.8, 0);
            issOrbitGroup.add(issLabel);

            // 通信覆盖范围
            coverageCircle = new THREE.Mesh(
                new THREE.RingGeometry(ISS_ORBIT_RADIUS - 1.2, ISS_ORBIT_RADIUS + 1.2, 64),
                new THREE.MeshBasicMaterial({
                    color: 0xffa040,
                    transparent: true,
                    opacity: 0.12,
                    side: THREE.DoubleSide
                })
            );
            coverageCircle.rotation.x = -Math.PI / 2;
            iss.add(coverageCircle);
        }

        function createOrbitPath() {
            const points = [];
            for (let i = 0; i <= 256; i++) {
                const angle = (i / 256) * Math.PI * 2;
                points.push(
                    Math.cos(angle) * ISS_ORBIT_RADIUS,
                    0,
                    Math.sin(angle) * ISS_ORBIT_RADIUS
                );
            }
            
            const orbitGeom = new THREE.BufferGeometry();
            orbitGeom.setAttribute('position', new THREE.Float32BufferAttribute(points, 3));
            
            issOrbitLine = new THREE.Line(orbitGeom, new THREE.LineBasicMaterial({
                color: 0x40e0a0,
                transparent: true,
                opacity: 0.5
            }));
            issOrbitGroup.add(issOrbitLine);
        }

        function createLights() {
            const sunLight = new THREE.DirectionalLight(0xffffff, 1.8);
            sunLight.position.set(50, 15, 25);
            scene.add(sunLight);

            scene.add(new THREE.AmbientLight(0x303050, 0.25));
        }

        function setupEventListeners() {
            document.getElementById('speedSlider').addEventListener('input', (e) => {
                timeScale = parseFloat(e.target.value);
                document.getElementById('speedValue').textContent = timeScale.toFixed(1) + 'x';
            });

            document.getElementById('viewFree').addEventListener('click', () => {
                followMode = false;
                document.getElementById('viewFree').classList.add('active');
                document.getElementById('viewFollow').classList.remove('active');
            });

            document.getElementById('viewFollow').addEventListener('click', () => {
                followMode = true;
                document.getElementById('viewFollow').classList.add('active');
                document.getElementById('viewFree').classList.remove('active');
            });

            document.getElementById('toggleOrbit').addEventListener('click', (e) => {
                showOrbit = !showOrbit;
                issOrbitLine.visible = showOrbit;
                e.target.classList.toggle('active', showOrbit);
            });

            document.getElementById('toggleLabel').addEventListener('click', (e) => {
                showLabel = !showLabel;
                issLabel.visible = showLabel;
                e.target.classList.toggle('active', showLabel);
            });

            document.getElementById('toggleCoverage').addEventListener('click', (e) => {
                showCoverage = !showCoverage;
                coverageCircle.visible = showCoverage;
                e.target.classList.toggle('active', showCoverage);
            });

            document.getElementById('toggleClouds').addEventListener('click', (e) => {
                showClouds = !showClouds;
                clouds.visible = showClouds;
                e.target.classList.toggle('active', showClouds);
            });

            document.getElementById('toggleNight').addEventListener('click', (e) => {
                showNight = !showNight;
                e.target.classList.toggle('active', showNight);
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function updateUI() {
            const worldPos = new THREE.Vector3();
            iss.getWorldPosition(worldPos);
            
            const lat = Math.asin(worldPos.y / ISS_ORBIT_RADIUS) * 180 / Math.PI;
            const lon = Math.atan2(worldPos.z, worldPos.x) * 180 / Math.PI;
            
            const latStr = lat >= 0 ? lat.toFixed(1) + '°N' : (-lat).toFixed(1) + '°S';
            const lonStr = lon >= 0 ? lon.toFixed(1) + '°E' : (-lon).toFixed(1) + '°W';
            
            document.getElementById('currentPos').textContent = latStr + ', ' + lonStr;
            document.getElementById('orbitCount').textContent = Math.floor(orbitCount);
        }

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            const angularSpeed = (2 * Math.PI) / 30;
            currentAngle += delta * angularSpeed * timeScale;
            
            if (currentAngle >= Math.PI * 2) {
                currentAngle -= Math.PI * 2;
                orbitCount++;
            }

            iss.position.x = Math.cos(currentAngle) * ISS_ORBIT_RADIUS;
            iss.position.z = Math.sin(currentAngle) * ISS_ORBIT_RADIUS;
            iss.rotation.y = -currentAngle + Math.PI / 2;

            issLabel.position.set(iss.position.x, 0.8, iss.position.z);

            earth.rotation.y += delta * 0.03;
            clouds.rotation.y += delta * 0.035;

            if (earth.material.uniforms) {
                earth.material.uniforms.uShowNight.value = showNight ? 1.0 : 0.0;
            }

            if (followMode) {
                const worldPos = new THREE.Vector3();
                iss.getWorldPosition(worldPos);
                const targetPos = worldPos.clone().add(new THREE.Vector3(4, 2.5, 4));
                camera.position.lerp(targetPos, delta * 2);
                controls.target.lerp(worldPos, delta * 2);
            }

            updateUI();
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
