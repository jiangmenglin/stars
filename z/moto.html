	<!DOCTYPE html>
	<html lang="zh-CN">
	<head>
	    <meta charset="UTF-8">
	    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	    <title>四缸四冲程发动机运行模拟</title>
	    <style>
	        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
	        .container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
	        .engine-block { display: flex; gap: 10px; background: #333; padding: 20px; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
	        .cylinder { width: 80px; height: 250px; background: #555; position: relative; border: 2px solid #888; overflow: hidden; border-radius: 4px; }
	        /* 活塞与连杆 */
	        .piston { width: 76px; height: 40px; background: #c0c0c0; position: absolute; left: 2px; border-radius: 2px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
	        .connecting-rod { width: 6px; height: 80px; background: #808080; position: absolute; left: 37px; top: 40px; transform-origin: top center; }
	        /* 气门系统 */
	        .valves { position: absolute; top: 0; width: 100%; height: 30px; display: flex; justify-content: space-around; }
	        .valve { width: 15px; height: 30px; background: #444; transition: transform 0.05s; }
	        .valve.open { transform: translateY(10px); background: #ff4444; /* 进气门开 */ }
	        .valve.exhaust.open { background: #4444ff; /* 排气门开 */ }
	        /* 状态指示 */
	        .status { color: #ddd; font-size: 12px; margin-top: 10px; }
	        /* 控制面板 */
	        .controls { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
	        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
	        button:hover { background: #0056b3; }
	        .rpm-display { font-size: 24px; font-weight: bold; color: #333; margin-top: 10px; }
	    </style>
	</head>
	<body>
	<div class="container">
	    <h2>四缸摩托车四冲程发动机模拟</h2>
	    <p style="color: #666;">基于解剖实训台原理演示：曲轴转动、活塞运行、配气正时</p>
	    <div class="engine-block" id="engine">
	        <!-- 4个气缸将由JS生成 -->
	    </div>
	    <div class="rpm-display">转速: <span id="rpm">600</span> RPM</div>
	    <div class="controls">
	        <button onclick="changeSpeed(-100)">减速</button>
	        <button onclick="toggleRun()" id="startBtn">暂停</button>
	        <button onclick="changeSpeed(100)">加速</button>
	    </div>
	</div>
	<script>
	    const engineEl = document.getElementById('engine');
	    const rpmEl = document.getElementById('rpm');
	    let rpm = 600;
	    let isRunning = true;
	    let angle = 0;
	    // 四缸点火顺序通常为 1-2-4-3 或 1-3-4-2，相位差 180度
	    // 这里的相位偏移 (度)
	    const cylinders = [
	        { id: 1, phase: 0 },    // 缸1
	        { id: 2, phase: 180 },  // 缸2
	        { id: 3, phase: 540 },  // 缸3 (相对缸1延迟540度，即1.5圈)
	        { id: 4, phase: 360 }   // 缸4
	    ];
	    // 初始化渲染气缸
	    cylinders.forEach(c => {
	        engineEl.innerHTML += `
	            <div class="cylinder" id="cyl-${c.id}">
	                <div class="valves">
	                    <div class="valve intake" id="in-${c.id}"></div>
	                    <div class="valve exhaust" id="ex-${c.id}"></div>
	                </div>
	                <div class="piston" id="pis-${c.id}">
	                    <div class="connecting-rod"></div>
	                </div>
	                <div class="status" id="stat-${c.id}">准备</div>
	            </div>
	        `;
	    });
	    function animate() {
	        if (!isRunning) {
	            requestAnimationFrame(animate);
	            return;
	        }
	        // 根据RPM计算步进角度 (简化计算)
	        // 60fps 基础上，每帧转动的角度
	        const step = (rpm / 60) * 6; // 约360度/秒 @ 60rpm，此处按比例缩放
	        angle += step;
	        cylinders.forEach(c => {
	            // 计算当前曲轴角度 (0-720度循环)
	            let currentAngle = (angle + c.phase) % 720;
	            // 活塞位置计算 (简谐运动近似)
	            // 曲轴转角转为弧度
	            let rad = (currentAngle * Math.PI) / 180;
	            // 活塞高度位移 (简单正弦波模拟上下止点)
	            // 偏移量：曲轴半径r，连杆长l，这里简化处理
	            let pistonY = 150 + Math.cos(rad) * 50; // 150是基准位置，50是冲程半径
	            const pistonEl = document.getElementById(`pis-${c.id}`);
	            pistonEl.style.top = pistonY + 'px';
	            // 四冲程逻辑判断 (0-720度)
	            // 0-180: 进气 (活塞下行，进气门开)
	            // 180-360: 压缩 (活塞上行，门全关)
	            // 360-540: 做功 (活塞下行，门全关，点火)
	            // 540-720: 排气 (活塞上行，排气门开)
	            const intakeEl = document.getElementById(`in-${c.id}`);
	            const exhaustEl = document.getElementById(`ex-${c.id}`);
	            const statusEl = document.getElementById(`stat-${c.id}`);
	            // 重置气门状态
	            intakeEl.classList.remove('open');
	            exhaustEl.classList.remove('open');
	            statusEl.style.color = '#ddd';
	            if (currentAngle >= 0 && currentAngle < 180) {
	                // 进气冲程
	                intakeEl.classList.add('open');
	                statusEl.textContent = "进气";
	                statusEl.style.color = '#4caf50';
	            } else if (currentAngle >= 180 && currentAngle < 360) {
	                // 压缩冲程
	                statusEl.textContent = "压缩";
	                statusEl.style.color = '#ffeb3b';
	            } else if (currentAngle >= 360 && currentAngle < 540) {
	                // 做功冲程
	                // 模拟点火 (在360度瞬间变色)
	                if(currentAngle < 380) pistonEl.style.background = '#ff9800'; // 爆燃高亮
	                else pistonEl.style.background = '#c0c0c0';
	                statusEl.textContent = "做功";
	                statusEl.style.color = '#f44336';
	            } else {
	                // 排气冲程
	                exhaustEl.classList.add('open');
	                statusEl.textContent = "排气";
	                statusEl.style.color = '#2196f3';
	            }
	        });
	        requestAnimationFrame(animate);
	    }
	    function changeSpeed(amount) {
	        rpm = Math.max(100, rpm + amount);
	        rpmEl.textContent = rpm;
	    }
	    function toggleRun() {
	        isRunning = !isRunning;
	        document.getElementById('startBtn').textContent = isRunning ? '暂停' : '运行';
	    }
	    // 启动动画
	    animate();
	</script>
	</body>
	</html>
