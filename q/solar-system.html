<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太阳系模拟运行（含月球）</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #fff;
    user-select: none;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    background: linear-gradient(90deg, rgba(30,30,60,.95) 0%, rgba(10,10,30,.9) 100%);
    border-bottom: 1px solid rgba(255,255,255,.08);
    flex-wrap: wrap;
    gap: 10px;
    z-index: 10;
  }
  header h1 { font-size: 1.25rem; letter-spacing: .04em; white-space: nowrap; }
  .controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .controls label { font-size: .85rem; opacity: .8; cursor: pointer; }
  .controls input[type=range] { width: 140px; accent-color: #6cf; }
  .controls button {
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.2);
    color: #fff; padding: 5px 16px; border-radius: 6px;
    cursor: pointer; font-size: .85rem; transition: background .2s;
  }
  .controls button:hover { background: rgba(255,255,255,.22); }
  .info-panel {
    position: fixed;
    display: none;
    background: rgba(18, 18, 42, .92);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 10px;
    padding: 14px 18px;
    min-width: 210px;
    backdrop-filter: blur(8px);
    pointer-events: none;
    z-index: 20;
    box-shadow: 0 4px 24px rgba(0,0,0,.5);
  }
  .info-panel h3 { margin-bottom: 6px; font-size: 1rem; }
  .info-panel p { font-size: .82rem; opacity: .75; margin: 2px 0; white-space: pre-line; }
  canvas { display: block; flex: 1; }
</style>
</head>
<body>

<header>
  <h1>🌌 太阳系模拟运行</h1>
  <div class="controls">
    <label>速度: <input type="range" id="speedRange" min="0.1" max="8" step="0.1" value="1"></label>
    <span id="speedVal">1.0x</span>
    <button id="btnPause">⏸ 暂停</button>
    <button id="btnReset">🔄 重置</button>
    <label><input type="checkbox" id="chkOrbits" checked> 轨道线</label>
    <label><input type="checkbox" id="chkLabels" checked> 名称</label>
  </div>
</header>

<canvas id="solarCanvas"></canvas>
<div class="info-panel" id="infoPanel">
  <h3 id="infoName"></h3>
  <p id="infoDetails"></p>
</div>

<script>
/* ═══════════════════════════════════════════
   太阳系 + 月球模拟
   ═══════════════════════════════════════════ */
const canvas = document.getElementById('solarCanvas');
const ctx    = canvas.getContext('2d');
const W = () => canvas.width;
const H = () => canvas.height;
const cx = () => W() / 2;
const cy = () => H() / 2;

/* ---------- 星空背景 ---------- */
let stars = [];
function generateStars(n = 500) {
  stars = Array.from({ length: n }, () => ({
    x: Math.random() * W(), y: Math.random() * H(),
    r: Math.random() * 1.5 + 0.2, alpha: Math.random() * 0.6 + 0.3
  }));
}

/* ---------- 行星数据 ---------- */
const planets = [
  { name: '水星', nameEn: 'Mercury', dist: 58,  size: 3.5, speed: 4.15,  color: '#b5b5b5', period: 0.24,  info: '距太阳最近 · 直径 4 879 km · 无卫星' },
  { name: '金星', nameEn: 'Venus',   dist: 90,  size: 5.5, speed: 1.62,  color: '#eebb66', period: 0.61,  info: '逆自转 · 直径 12 104 km · 大气压 90 倍' },
  { name: '地球', nameEn: 'Earth',   dist: 125, size: 6,   speed: 1.0,   color: '#4499ff', period: 1.0,   info: '我们的家园 · 直径 12 742 km · 1 颗卫星' },
  { name: '火星', nameEn: 'Mars',    dist: 165, size: 4.5, speed: 0.53,  color: '#dd5533', period: 1.88,  info: '红色星球 · 直径 6 771 km · 2 颗卫星' },
  { name: '木星', nameEn: 'Jupiter', dist: 230, size: 16,  speed: 0.084, color: '#dcae7e', period: 11.86, info: '最大行星 · 直径 139 820 km · 95 颗卫星' },
  { name: '土星', nameEn: 'Saturn',  dist: 300, size: 13,  speed: 0.034, color: '#e8d5a0', period: 29.46, info: '壮丽光环 · 直径 116 460 km · 146 颗卫星', hasRing: true },
  { name: '天王星', nameEn: 'Uranus', dist: 370, size: 9,   speed: 0.012, color: '#88ccdd', period: 84.01, info: '侧卧自转 · 直径 50 724 km · 27 颗卫星' },
  { name: '海王星', nameEn: 'Neptune',dist: 440, size: 8.5, speed: 0.006, color: '#3366cc', period: 164.8, info: '风速最快 · 直径 49 244 km · 16 颗卫星' }
];
planets.forEach(p => { p.angle = Math.random() * 360; p.x = 0; p.y = 0; });

/* ---------- 卫星数据（月球） ---------- */
const moons = [{
  name: '月球', nameEn: 'Moon', dist: 18, size: 2.5, speed: 13.0, color: '#c8c8c8',
  period: '27.3 天', info: '地球唯一自然卫星\n直径 3 474 km · 潮汐锁定',
  type: 'moon', angle: Math.random() * 360, x: 0, y: 0
}];

/* ---------- 状态 ---------- */
let running  = true;
let speedMul = 1;
let showOrbits = true;
let showLabels = true;
let lastTime = 0;
let mouse = { x: 0, y: 0 };

/* ---------- 工具函数 ---------- */
function lighten(hex, amt) {
  let r = parseInt(hex.slice(1, 3), 16);
  let g = parseInt(hex.slice(3, 5), 16);
  let b = parseInt(hex.slice(5, 7), 16);
  r = Math.min(255, r + amt); g = Math.min(255, g + amt); b = Math.min(255, b + amt);
  return `rgb(${r},${g},${b})`;
}

function drawOrbit(dist, center = { x: cx(), y: cy() }) {
  ctx.strokeStyle = 'rgba(255,255,255,.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(center.x, center.y, dist, 0, Math.PI * 2);
  ctx.stroke();
}

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight - document.querySelector('header').offsetHeight;
  generateStars();
}
window.addEventListener('resize', resize);
resize();

/* ---------- 主循环 ---------- */
function update(timestamp) {
  const delta = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  const delta60 = delta * 60;

  /* 更新位置 */
  if (running) {
    planets.forEach(p => {
      p.angle += p.speed * speedMul * delta60;
      p.angle %= 360;
      const rad = p.angle * Math.PI / 180;
      p.x = cx() + Math.cos(rad) * p.dist;
      p.y = cy() + Math.sin(rad) * p.dist;
    });

    const earth = planets[2];
    moons.forEach(m => {
      m.angle += m.speed * speedMul * delta60;
      m.angle %= 360;
      const rad = m.angle * Math.PI / 180;
      m.x = earth.x + Math.cos(rad) * m.dist;
      m.y = earth.y + Math.sin(rad) * m.dist;
    });
  }

  /* 绘制 */
  ctx.clearRect(0, 0, W(), H());

  // 星空
  for (const s of stars) {
    ctx.fillStyle = `rgba(255,255,255,${s.alpha * (0.8 + 0.2 * Math.sin(Date.now() / 800 + s.x))})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  }

  // 轨道
  if (showOrbits) {
    const sunCenter = { x: cx(), y: cy() };
    planets.forEach(p => drawOrbit(p.dist, sunCenter));
    moons.forEach(m => drawOrbit(m.dist, planets[2]));
  }

  // 太阳
  const gradSun = ctx.createRadialGradient(cx() - 4, cy() - 4, 2, cx(), cy(), 22);
  gradSun.addColorStop(0, '#fff8e0'); gradSun.addColorStop(0.5, '#ffda44'); gradSun.addColorStop(1, '#ff8800');
  ctx.fillStyle = gradSun;
  ctx.beginPath(); ctx.arc(cx(), cy(), 22, 0, Math.PI * 2); ctx.fill();
  // 太阳辉光
  const glow = ctx.createRadialGradient(cx(), cy(), 22, cx(), cy(), 88);
  glow.addColorStop(0, 'rgba(255,200,50,.25)'); glow.addColorStop(1, 'rgba(255,150,0,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(cx(), cy(), 88, 0, Math.PI * 2); ctx.fill();
  if (showLabels) {
    ctx.fillStyle = '#ffe082'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('☀ 太阳', cx(), cy() + 38);
  }

  // 行星
  for (const p of planets) {
    // 土星环 (后层处理)
    if (p.hasRing) {
      ctx.save(); ctx.translate(p.x, p.y); ctx.scale(1, 0.35);
      ctx.strokeStyle = 'rgba(210,190,150,.55)'; ctx.lineWidth = 5;
      ctx.beginPath(); ctx.arc(0, 0, p.size + 9, 0, Math.PI * 2); ctx.stroke();
      ctx.strokeStyle = 'rgba(180,160,120,.35)'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(0, 0, p.size + 13, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }
    const grad = ctx.createRadialGradient(p.x - p.size * .3, p.y - p.size * .3, p.size * .1, p.x, p.y, p.size);
    grad.addColorStop(0, lighten(p.color, 60)); grad.addColorStop(1, p.color);
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    if (showLabels) {
      ctx.fillStyle = 'rgba(255,255,255,.7)'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(p.name, p.x, p.y - p.size - 6);
    }
  }

  // 卫星（月球）
  for (const m of moons) {
    const grad = ctx.createRadialGradient(m.x - m.size * .3, m.y - m.size * .3, m.size * .1, m.x, m.y, m.size);
    grad.addColorStop(0, lighten(m.color, 50)); grad.addColorStop(1, m.color);
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(m.x, m.y, m.size, 0, Math.PI * 2); ctx.fill();
    if (showLabels) {
      ctx.fillStyle = 'rgba(200,200,200,.85)'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(m.name, m.x, m.y - m.size - 5);
    }
  }

  /* 悬停检测 */
  const info = document.getElementById('infoPanel');
  let target = null;
  const allBodies = [...planets, ...moons];
  for (const b of allBodies) {
    const hitR = b.size + (b.type === 'moon' ? 6 : 8);
    if (Math.hypot(mouse.x - b.x, mouse.y - b.y) < hitR) { target = b; break; }
  }

  // 太阳检测
  if (!target && Math.hypot(mouse.x - cx(), mouse.y - cy()) < 30) {
    target = { name: '太阳', nameEn: 'Sun', period: 'N/A', info: '太阳系中心恒星\n直径 1 392 700 km\n占太阳系总质量 99.86%' };
  }

  if (target) {
    info.style.display = 'block';
    info.style.left = (mouse.x + 18) + 'px';
    info.style.top  = (mouse.y - 12) + 'px';
    // 防溢出屏幕
    if (mouse.x + 230 > W()) info.style.left = (mouse.x - 220) + 'px';
    document.getElementById('infoName').textContent = `${target.name}  ${target.nameEn || ''}`;
    document.getElementById('infoDetails').innerHTML = `${target.info}<br><b>公转周期:</b> ${target.period || '-'}`;
  } else {
    info.style.display = 'none';
  }

  requestAnimationFrame(update);
}

lastTime = performance.now();
requestAnimationFrame(update);

/* ---------- 控件绑定 ---------- */
const speedRange = document.getElementById('speedRange');
const speedVal   = document.getElementById('speedVal');
document.getElementById('btnPause').addEventListener('click', function () {
  running = !running; this.textContent = running ? '⏸ 暂停' : '▶ 播放';
});
document.getElementById('btnReset').addEventListener('click', () => {
  planets.forEach(p => { p.angle = Math.random() * 360; });
  moons.forEach(m => { m.angle = Math.random() * 360; });
});
speedRange.addEventListener('input', () => {
  speedMul = parseFloat(speedRange.value);
  speedVal.textContent = speedMul.toFixed(1) + 'x';
});
document.getElementById('chkOrbits').addEventListener('change', e => showOrbits = e.target.checked);
document.getElementById('chkLabels').addEventListener('change', e => showLabels = e.target.checked);

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});
canvas.addEventListener('mouseleave', () => {
  mouse.x = mouse.y = -9999;
  document.getElementById('infoPanel').style.display = 'none';
});
</script>
</body>
</html>
