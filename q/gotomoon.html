<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 地月往返任务模拟</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    font-family: 'Courier New', monospace;
    background: #000;
    color: #fff;
    user-select: none;
  }

  canvas#spaceCanvas {
    position: fixed;
    top: 0; left: 0;
    z-index: 0;
  }

  .ui-overlay {
    position: fixed;
    z-index: 10;
    pointer-events: none;
  }

  .ui-overlay > * {
    pointer-events: auto;
  }

  /* 顶部任务栏 */
  .mission-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 20;
    background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.0) 100%);
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .mission-title {
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 3px;
    color: #00d4ff;
    text-shadow: 0 0 20px rgba(0,212,255,0.5);
  }

  .mission-time {
    font-size: 14px;
    color: #ff9f43;
    text-shadow: 0 0 10px rgba(255,159,67,0.5);
  }

  /* 阶段指示器 */
  .phase-indicator {
    position: fixed;
    top: 60px; left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .phase-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 2px solid #333;
    background: transparent;
    transition: all 0.5s;
  }

  .phase-dot.active {
    background: #00d4ff;
    border-color: #00d4ff;
    box-shadow: 0 0 15px rgba(0,212,255,0.8);
  }

  .phase-dot.completed {
    background: #2ed573;
    border-color: #2ed573;
    box-shadow: 0 0 10px rgba(46,213,115,0.5);
  }

  .phase-line {
    width: 30px; height: 2px;
    background: #333;
    transition: background 0.5s;
  }

  .phase-line.completed {
    background: #2ed573;
  }

  /* 阶段标签 */
  .phase-label {
    position: fixed;
    top: 90px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 5px;
    color: #fff;
    text-shadow: 0 0 30px rgba(255,255,255,0.3);
    transition: all 0.5s;
  }

  /* 左侧数据面板 */
  .data-panel {
    position: fixed;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 20;
    background: rgba(0,10,30,0.85);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 10px;
    padding: 20px;
    width: 220px;
    backdrop-filter: blur(10px);
  }

  .data-panel h3 {
    font-size: 12px;
    color: #00d4ff;
    letter-spacing: 2px;
    margin-bottom: 15px;
    border-bottom: 1px solid rgba(0,212,255,0.2);
    padding-bottom: 8px;
  }

  .data-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    font-size: 12px;
  }

  .data-label { color: #888; }
  .data-value { color: #fff; font-weight: bold; }
  .data-value.warning { color: #ff9f43; }
  .data-value.danger { color: #ff4757; }
  .data-value.success { color: #2ed573; }

  /* 右侧控制面板 */
  .control-panel {
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .ctrl-btn {
    background: rgba(0,10,30,0.85);
    border: 1px solid rgba(0,212,255,0.4);
    color: #00d4ff;
    padding: 12px 20px;
    border-radius: 8px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
    text-align: center;
    min-width: 180px;
  }

  .ctrl-btn:hover {
    background: rgba(0,212,255,0.15);
    border-color: #00d4ff;
    box-shadow: 0 0 20px rgba(0,212,255,0.3);
    transform: scale(1.05);
  }

  .ctrl-btn:active {
    transform: scale(0.95);
  }

  .ctrl-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }

  .ctrl-btn.primary {
    background: rgba(0,212,255,0.2);
    border-color: #00d4ff;
    font-size: 15px;
    padding: 15px 25px;
  }

  .ctrl-btn.danger {
    border-color: rgba(255,71,87,0.4);
    color: #ff4757;
  }

  .ctrl-btn.danger:hover {
    background: rgba(255,71,87,0.15);
    border-color: #ff4757;
    box-shadow: 0 0 20px rgba(255,71,87,0.3);
  }

  .ctrl-btn.success {
    border-color: rgba(46,213,115,0.4);
    color: #2ed573;
  }

  .ctrl-btn.success:hover {
    background: rgba(46,213,115,0.15);
    border-color: #2ed573;
    box-shadow: 0 0 20px rgba(46,213,115,0.3);
  }

  /* 底部日志 */
  .log-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 20;
    background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 80%, transparent 100%);
    padding: 20px 30px 25px;
  }

  .log-title {
    font-size: 11px;
    color: #555;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .log-content {
    height: 60px;
    overflow: hidden;
    font-size: 12px;
    color: #888;
  }

  .log-entry {
    padding: 2px 0;
    animation: fadeIn 0.5s;
  }

  .log-entry .time { color: #555; }
  .log-entry .msg { color: #00d4ff; }
  .log-entry .msg.warn { color: #ff9f43; }
  .log-entry .msg.ok { color: #2ed573; }
  .log-entry .msg.err { color: #ff4757; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 速度表 */
  .speed-gauge {
    position: fixed;
    left: 20px;
    bottom: 120px;
    z-index: 20;
    width: 220px;
  }

  .gauge-bar-bg {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 5px;
  }

  .gauge-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s, background 0.3s;
    background: #00d4ff;
  }

  /* 提示消息 */
  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    z-index: 100;
    background: rgba(0,10,30,0.95);
    border: 1px solid #00d4ff;
    border-radius: 15px;
    padding: 30px 50px;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    backdrop-filter: blur(20px);
  }

  .toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  .toast h2 {
    font-size: 28px;
    margin-bottom: 10px;
    letter-spacing: 3px;
  }

  .toast p {
    color: #888;
    font-size: 14px;
  }

  /* 发射火焰效果 */
  .launch-flame {
    position: fixed;
    z-index: 15;
    pointer-events: none;
  }

  /* 警告闪烁 */
  @keyframes warningPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .warning-flash {
    animation: warningPulse 1s infinite;
  }

  /* 星空闪烁 */
  @keyframes twinkle {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* 响应式 */
  @media (max-width: 768px) {
    .data-panel { display: none; }
    .control-panel {
      right: 10px;
      top: auto;
      bottom: 100px;
      transform: none;
    }
    .ctrl-btn { min-width: 140px; padding: 10px 15px; font-size: 11px; }
    .phase-label { font-size: 16px; }
  }
</style>
</head>
<body>

<canvas id="spaceCanvas"></canvas>

<!-- 顶部任务栏 -->
<div class="mission-bar">
  <div class="mission-title">🌍 地月往返任务 <span style="color:#555">|</span> <span style="color:#fff;font-size:14px">CHANG'E SIM</span></div>
  <div class="mission-time" id="missionTime">T+ 00:00:00</div>
</div>

<!-- 阶段指示器 -->
<div class="phase-indicator" id="phaseIndicator">
  <div class="phase-dot active" data-phase="0"></div>
  <div class="phase-line"></div>
  <div class="phase-dot" data-phase="1"></div>
  <div class="phase-line"></div>
  <div class="phase-dot" data-phase="2"></div>
  <div class="phase-line"></div>
  <div class="phase-dot" data-phase="3"></div>
  <div class="phase-line"></div>
  <div class="phase-dot" data-phase="4"></div>
  <div class="phase-line"></div>
  <div class="phase-dot" data-phase="5"></div>
  <div class="phase-line"></div>
  <div class="phase-dot" data-phase="6"></div>
</div>

<!-- 阶段标签 -->
<div class="phase-label" id="phaseLabel">准备就绪</div>

<!-- 左侧数据面板 -->
<div class="data-panel">
  <h3>📊 任务数据</h3>
  <div class="data-row">
    <span class="data-label">任务阶段</span>
    <span class="data-value" id="dPhase">待机</span>
  </div>
  <div class="data-row">
    <span class="data-label">速度</span>
    <span class="data-value" id="dSpeed">0 km/s</span>
  </div>
  <div class="data-row">
    <span class="data-label">距地球</span>
    <span class="data-value" id="dDistEarth">0 km</span>
  </div>
  <div class="data-row">
    <span class="data-label">距月球</span>
    <span class="data-value" id="dDistMoon">384,400 km</span>
  </div>
  <div class="data-row">
    <span class="data-label">燃料</span>
    <span class="data-value" id="dFuel">100%</span>
  </div>
  <div class="data-row">
    <span class="data-label">舱温</span>
    <span class="data-value" id="dTemp">21°C</span>
  </div>
  <div class="data-row">
    <span class="data-label">氧气</span>
    <span class="data-value" id="dO2">100%</span>
  </div>
  <div class="data-row">
    <span class="data-label">乘员</span>
    <span class="data-value" id="dCrew">3 人</span>
  </div>
</div>

<!-- 速度表 -->
<div class="speed-gauge">
  <div class="data-row">
    <span class="data-label">推力</span>
    <span class="data-value" id="dThrust">0%</span>
  </div>
  <div class="gauge-bar-bg">
    <div class="gauge-bar-fill" id="thrustBar" style="width:0%"></div>
  </div>
</div>

<!-- 右侧控制面板 -->
<div class="control-panel" id="controlPanel">
  <button class="ctrl-btn primary" id="btnLaunch" onclick="startMission()">🚀 点火发射</button>
  <button class="ctrl-btn" id="btnOrbit" onclick="enterEarthOrbit()" disabled>🌍 进入地球轨道</button>
  <button class="ctrl-btn" id="btnTrans" onclick="transLunarInjection()" disabled>🔥 地月转移加速</button>
  <button class="ctrl-btn" id="btnLand" onclick="lunarLanding()" disabled>🌙 月球着陆</button>
  <button class="ctrl-btn" id="btnExplore" onclick="lunarExplore()" disabled>👨‍🚀 月面探索</button>
  <button class="ctrl-btn success" id="btnTakeoff" onclick="lunarTakeoff()" disabled>🚀 月面起飞</button>
  <button class="ctrl-btn" id="btnReturn" onclick="transEarthInjection()" disabled>🔥 返回地球加速</button>
  <button class="ctrl-btn danger" id="btnReentry" onclick="earthReentry()" disabled>🌍 再入大气层</button>
</div>

<!-- 底部日志 -->
<div class="log-panel">
  <div class="log-title">任务日志 MISSION LOG</div>
  <div class="log-content" id="logContent">
    <div class="log-entry"><span class="time">[00:00:00]</span> <span class="msg">系统初始化完成，等待发射指令...</span></div>
  </div>
</div>

<!-- 提示消息 -->
<div class="toast" id="toast">
  <h2 id="toastTitle"></h2>
  <p id="toastMsg"></p>
</div>

<script>
// ============ 星空画布 ============
const canvas = document.getElementById('spaceCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// 星星
const stars = [];
for (let i = 0; i < 300; i++) {
  stars.push({
    x: Math.random() * 3000,
    y: Math.random() * 2000,
    r: Math.random() * 1.5 + 0.5,
    twinkle: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.02 + 0.01
  });
}

// 流星
const meteors = [];
function spawnMeteor() {
  if (Math.random() < 0.005) {
    meteors.push({
      x: Math.random() * canvas.width,
      y: 0,
      vx: (Math.random() - 0.5) * 4,
      vy: Math.random() * 6 + 3,
      life: 1,
      len: Math.random() * 40 + 20
    });
  }
}

// 地球和月球位置
let earthX = 0, earthY = 0;
let moonX = 0, moonY = 0;
let shipX = 0, shipY = 0;
let shipAngle = 0;

// 任务状态
let missionPhase = 0; // 0:待机 1:发射 2:地月转移 3:着陆 4:月面 5:返回转移 6:再入
let missionStartTime = Date.now();
let missionElapsed = 0;
let fuel = 100;
let speed = 0;
let targetSpeed = 0;
let distanceToEarth = 0;
let distanceToMoon = 384400;
let thrust = 0;
let temperature = 21;
let oxygen = 100;
let exploreCount = 0;
let isAnimating = false;
let animationProgress = 0;
let animationCallback = null;
let shipOrbitAngle = 0;
let shipTrail = [];
let flameParticles = [];
let reentryParticles = [];
let missionComplete = false;

const PHASE_NAMES = [
  '地球发射台', '地球轨道', '地月转移', '月球着陆',
  '月面探索', '返回转移', '再入地球'
];

function addLog(msg, type = '') {
  const logContent = document.getElementById('logContent');
  const time = document.getElementById('missionTime').textContent;
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="time">[${time}]</span> <span class="msg ${type}">${msg}</span>`;
  logContent.insertBefore(entry, logContent.firstChild);
  if (logContent.children.length > 20) {
    logContent.removeChild(logContent.lastChild);
  }
}

function showToast(title, msg, duration = 2500) {
  const toast = document.getElementById('toast');
  document.getElementById('toastTitle').textContent = title;
  document.getElementById('toastMsg').textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), duration);
}

function updatePhaseIndicator() {
  const dots = document.querySelectorAll('.phase-dot');
  const lines = document.querySelectorAll('.phase-line');
  dots.forEach((d, i) => {
    d.classList.remove('active', 'completed');
    if (i < missionPhase) d.classList.add('completed');
    if (i === missionPhase) d.classList.add('active');
  });
  lines.forEach((l, i) => {
    l.classList.remove('completed');
    if (i < missionPhase) l.classList.add('completed');
  });
}

function updateData() {
  document.getElementById('dPhase').textContent = PHASE_NAMES[missionPhase];
  document.getElementById('dSpeed').textContent = speed.toFixed(1) + ' km/s';
  document.getElementById('dDistEarth').textContent = Math.round(distanceToEarth).toLocaleString() + ' km';
  document.getElementById('dDistMoon').textContent = Math.round(distanceToMoon).toLocaleString() + ' km';

  const fuelEl = document.getElementById('dFuel');
  fuelEl.textContent = Math.round(fuel) + '%';
  fuelEl.className = 'data-value' + (fuel < 20 ? ' danger' : fuel < 50 ? ' warning' : '');

  const tempEl = document.getElementById('dTemp');
  tempEl.textContent = Math.round(temperature) + '°C';
  tempEl.className = 'data-value' + (temperature > 40 ? ' danger' : temperature > 30 ? ' warning' : '');

  const o2El = document.getElementById('dO2');
  o2El.textContent = Math.round(oxygen) + '%';
  o2El.className = 'data-value' + (oxygen < 30 ? ' danger' : oxygen < 60 ? ' warning' : '');

  document.getElementById('dThrust').textContent = Math.round(thrust) + '%';
  document.getElementById('thrustBar').style.width = thrust + '%';
  document.getElementById('thrustBar').style.background =
    thrust > 80 ? '#ff4757' : thrust > 50 ? '#ff9f43' : '#00d4ff';

  const time = Math.floor(missionElapsed / 1000);
  const h = String(Math.floor(time / 3600)).padStart(2, '0');
  const m = String(Math.floor((time % 3600) / 60)).padStart(2, '0');
  const s = String(time % 60).padStart(2, '0');
  document.getElementById('missionTime').textContent = `T+ ${h}:${m}:${s}`;
}

function updateButtons() {
  document.getElementById('btnLaunch').disabled = missionPhase !== 0;
  document.getElementById('btnOrbit').disabled = missionPhase !== 1;
  document.getElementById('btnTrans').disabled = missionPhase !== 2;
  document.getElementById('btnLand').disabled = missionPhase !== 3;
  document.getElementById('btnExplore').disabled = missionPhase !== 4;
  document.getElementById('btnTakeoff').disabled = missionPhase !== 4;
  document.getElementById('btnReturn').disabled = missionPhase !== 5;
  document.getElementById('btnReentry').disabled = missionPhase !== 6;
}

// ============ 任务控制 ============
function setPhase(phase) {
  missionPhase = phase;
  updatePhaseIndicator();
  document.getElementById('phaseLabel').textContent = PHASE_NAMES[phase];
  updateButtons();
  updateData();
}

function animateTransition(targetPhase, duration, progressFn, completeFn) {
  if (isAnimating) return;
  isAnimating = true;
  animationProgress = 0;
  const start = Date.now();

  function step() {
    const elapsed = Date.now() - start;
    animationProgress = Math.min(elapsed / duration, 1);
    progressFn(animationProgress);
    if (animationProgress < 1) {
      requestAnimationFrame(step);
    } else {
      isAnimating = false;
      if (completeFn) completeFn();
    }
  }
  requestAnimationFrame(step);
}

function startMission() {
  if (isAnimating) return;
  setPhase(1);
  addLog('点火！主发动机启动！', 'ok');
  showToast('🚀 发射！', '飞船已点火升空', 2000);

  thrust = 100;
  targetSpeed = 7.8;

  animateTransition(1, 3000, (p) => {
    speed = targetSpeed * p;
    fuel -= 0.3 * p;
    temperature = 21 + 10 * p;
    distanceToEarth = p * 200;
    distanceToMoon = 384400 - distanceToEarth;

    // 发射火焰粒子
    for (let i = 0; i < 5; i++) {
      flameParticles.push({
        x: shipX,
        y: shipY + 15,
        vx: (Math.random() - 0.5) * 3,
        vy: Math.random() * 4 + 2,
        life: 1,
        r: Math.random() * 4 + 2,
        color: Math.random() > 0.5 ? '#ff6b35' : '#ffd700'
      });
    }
  }, () => {
    addLog('已进入地球轨道，速度 7.8 km/s', 'ok');
    showToast('🌍 地球轨道', '成功进入近地轨道', 2000);
    thrust = 0;
  });
}

function enterEarthOrbit() {
  setPhase(2);
  addLog('绕地飞行一圈，系统检查正常');
  shipOrbitAngle = 0;

  animateTransition(2, 2000, (p) => {
    thrust = 0;
    speed = 7.8;
    distanceToEarth = 200 + p * 5000;
    distanceToMoon = 384400 - distanceToEarth;
  }, () => {
    addLog('轨道调整完毕，准备地月转移');
    showToast('📡 轨道确认', '准备执行地月转移轨道注入', 2000);
  });
}

function transLunarInjection() {
  addLog('TLI点火！地月转移轨道注入！', 'warn');
  showToast('🔥 TLI点火', '飞向月球！', 2000);
  thrust = 90;
  targetSpeed = 10.8;

  animateTransition(3, 5000, (p) => {
    speed = 7.8 + (targetSpeed - 7.8) * p;
    fuel -= 0.15 * p;
    temperature = 21 + 15 * p;
    distanceToEarth = 5200 + p * (384400 * 0.85);
    distanceToMoon = 384400 - distanceToEarth;

    for (let i = 0; i < 3; i++) {
      flameParticles.push({
        x: shipX,
        y: shipY + 12,
        vx: (Math.random() - 0.5) * 2,
        vy: Math.random() * 3 + 1,
        life: 1,
        r: Math.random() * 3 + 1,
        color: Math.random() > 0.5 ? '#ff6b35' : '#ffd700'
      });
    }
  }, () => {
    setPhase(3);
    addLog('TLI完成！正在接近月球', 'ok');
    thrust = 0;
    showToast('🌙 接近月球', '已进入月球引力范围', 2000);
  });
}

function lunarLanding() {
  addLog('启动制动引擎，准备着陆...', 'warn');
  showToast('🌙 着陆程序', '正在降落月球表面', 2000);
  thrust = 60;

  animateTransition(4, 4000, (p) => {
    speed = 10.8 * (1 - p);
    fuel -= 0.2 * p;
    temperature = 36 - 15 * p;
    distanceToEarth = 384400 * 0.85 + p * (384400 * 0.15);
    distanceToMoon = 384400 - distanceToEarth;

    for (let i = 0; i < 4; i++) {
      flameParticles.push({
        x: shipX,
        y: shipY + 10,
        vx: (Math.random() - 0.5) * 2,
        vy: Math.random() * 2 + 1,
        life: 1,
        r: Math.random() * 3 + 1,
        color: Math.random() > 0.5 ? '#ff6b35' : '#ffd700'
      });
    }
  }, () => {
    setPhase(4);
    speed = 0;
    thrust = 0;
    temperature = 15;
    distanceToMoon = 0;
    addLog('着陆成功！欢迎登陆月球！🌙', 'ok');
    showToast('🎉 着陆成功！', '已成功降落在月球表面', 3000);
  });
}

function lunarExplore() {
  if (isAnimating) return;
  exploreCount++;
  fuel -= 0.5;
  oxygen -= 2;

  const messages = [
    '采集月球岩石样本...',
    '部署科学实验仪器...',
    '拍摄月球全景照片...',
    '检测月球土壤成分...',
    '建立临时通讯基站...',
    '收集月壤氦-3样本...'
  ];

  const msg = messages[exploreCount % messages.length];
  addLog(msg, 'ok');

  if (exploreCount >= 5) {
    addLog('月面探索任务完成！样本已收集', 'ok');
    showToast('👨‍🚀 探索完成', '所有科学任务已完成，准备返回', 2500);
  } else {
    showToast('🔬 探索中', `已完成 ${exploreCount}/5 项任务`, 1500);
  }
}

function lunarTakeoff() {
  addLog('上升引擎点火！离开月球表面！', 'warn');
  showToast('🚀 月面起飞', '正在离开月球', 2000);
  thrust = 80;
  targetSpeed = 2.4;

  animateTransition(5, 3000, (p) => {
    speed = targetSpeed * p;
    fuel -= 0.15 * p;
    temperature = 15 + 20 * p;
    distanceToMoon = p * 100;
    distanceToEarth = 384400 - distanceToMoon;

    for (let i = 0; i < 4; i++) {
      flameParticles.push({
        x: shipX,
        y: shipY + 12,
        vx: (Math.random() - 0.5) * 2,
        vy: Math.random() * 3 + 1,
        life: 1,
        r: Math.random() * 3 + 1,
        color: Math.random() > 0.5 ? '#ff6b35' : '#ffd700'
      });
    }
  }, () => {
    setPhase(5);
    addLog('已进入返回轨道，准备返回地球', 'ok');
    thrust = 0;
    showToast('📡 轨道确认', '返回地球轨道已建立', 2000);
  });
}

function transEarthInjection() {
  addLog('TEI点火！返回地球转移轨道注入！', 'warn');
  showToast('🔥 TEI点火', '踏上归途！', 2000);
  thrust = 85;
  targetSpeed = 10.5;

  animateTransition(6, 5000, (p) => {
    speed = 2.4 + (targetSpeed - 2.4) * p;
    fuel -= 0.12 * p;
    temperature = 35 + 20 * p;
    distanceToEarth = 384300 * (1 - p);
    distanceToMoon = 384400 - distanceToEarth;

    for (let i = 0; i < 3; i++) {
      flameParticles.push({
        x: shipX,
        y: shipY + 12,
        vx: (Math.random() - 0.5) * 2,
        vy: Math.random() * 3 + 1,
        life: 1,
        r: Math.random() * 3 + 1,
        color: Math.random() > 0.5 ? '#ff6b35' : '#ffd700'
      });
    }
  }, () => {
    setPhase(6);
    addLog('正在接近地球，准备再入！', 'warn');
    thrust = 0;
    showToast('🌍 接近地球', '准备再入大气层', 2000);
  });
}

function earthReentry() {
  addLog('再入大气层！防热盾温度急剧上升！', 'err');
  showToast('🌍 再入大气层', '防热盾承受高温', 2500);
  thrust = 0;

  animateTransition(7, 4000, (p) => {
    speed = 10.5 * (1 - p * 0.7);
    temperature = 55 + 150 * Math.sin(p * Math.PI);
    fuel -= 0.05;
    oxygen -= 0.5 * p;
    distanceToEarth = 384400 * (1 - p);
    distanceToMoon = 384400 - distanceToEarth;

    // 再入粒子效果
    for (let i = 0; i < 8; i++) {
      reentryParticles.push({
        x: shipX + (Math.random() - 0.5) * 20,
        y: shipY + (Math.random() - 0.5) * 20,
        vx: (Math.random() - 0.5) * 5,
        vy: (Math.random() - 0.5) * 5,
        life: 1,
        r: Math.random() * 5 + 2,
        color: `hsl(${Math.random() * 40 + 10}, 100%, 60%)`
      });
    }
  }, () => {
    speed = 0;
    temperature = 21;
    distanceToEarth = 0;
    distanceToMoon = 384400;
    missionComplete = true;
    setPhase(0);
    document.getElementById('phaseLabel').textContent = '🎉 任务成功！';
    addLog('🎉 返回舱成功着陆！任务圆满完成！', 'ok');
    showToast('🏆 任务完成！', '欢迎回到地球！', 4000);
    updateButtons();

    // 禁用所有按钮
    document.querySelectorAll('.ctrl-btn').forEach(b => b.disabled = true);
  });
}

// ============ 绘制函数 ============
function drawStars() {
  stars.forEach(s => {
    s.twinkle += s.speed;
    const alpha = 0.5 + 0.5 * Math.sin(s.twinkle);
    ctx.beginPath();
    ctx.arc(s.x % canvas.width, s.y % canvas.height, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();
  });
}

function drawMeteors() {
  spawnMeteor();
  for (let i = meteors.length - 1; i >= 0; i--) {
    const m = meteors[i];
    m.x += m.vx;
    m.y += m.vy;
    m.life -= 0.015;
    if (m.life <= 0) { meteors.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.moveTo(m.x, m.y);
    ctx.lineTo(m.x - m.vx * m.len / 5, m.y - m.vy * m.len / 5);
    const grad = ctx.createLinearGradient(m.x, m.y, m.x - m.vx * m.len / 5, m.y - m.vy * m.len / 5);
    grad.addColorStop(0, `rgba(255,255,255,${m.life})`);
    grad.addColorStop(1, `rgba(255,255,255,0)`);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

function drawEarth(x, y, radius) {
  // 大气层光晕
  const glow = ctx.createRadialGradient(x, y, radius * 0.8, x, y, radius * 2.5);
  glow.addColorStop(0, 'rgba(100,180,255,0.15)');
  glow.addColorStop(0.5, 'rgba(100,180,255,0.05)');
  glow.addColorStop(1, 'rgba(100,180,255,0)');
  ctx.beginPath();
  ctx.arc(x, y, radius * 2.5, 0, Math.PI * 2);
  ctx.fillStyle = glow;
  ctx.fill();

  // 地球本体
  const earthGrad = ctx.createRadialGradient(x - radius * 0.3, y - radius * 0.3, 0, x, y, radius);
  earthGrad.addColorStop(0, '#4a90d9');
  earthGrad.addColorStop(0.3, '#2e7bbf');
  earthGrad.addColorStop(0.6, '#1a5f8b');
  earthGrad.addColorStop(0.8, '#0d3d5c');
  earthGrad.addColorStop(1, '#062033');
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fillStyle = earthGrad;
  ctx.fill();

  // 大陆轮廓（简化）
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.clip();

  // 绿色区域
  const continents = [
    { cx: -0.3, cy: -0.2, rx: 0.25, ry: 0.2 },
    { cx: 0.1, cy: -0.3, rx: 0.15, ry: 0.12 },
    { cx: 0.3, cy: 0.1, rx: 0.12, ry: 0.25 },
    { cx: -0.15, cy: 0.3, rx: 0.2, ry: 0.15 },
    { cx: 0.4, cy: -0.15, rx: 0.08, ry: 0.1 },
  ];

  continents.forEach(c => {
    ctx.beginPath();
    ctx.ellipse(x + c.cx * radius, y + c.cy * radius, c.rx * radius, c.ry * radius, 0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(34,139,34,0.4)';
    ctx.fill();
  });

  // 云层
  for (let i = 0; i < 8; i++) {
    const angle = (Date.now() / 50000 + i * 0.8) % (Math.PI * 2);
    const cx = x + Math.cos(angle) * radius * 0.6;
    const cy = y + Math.sin(angle) * radius * 0.4;
    ctx.beginPath();
    ctx.ellipse(cx, cy, radius * 0.15, radius * 0.05, angle, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fill();
  }

  ctx.restore();

  // 边缘高光
  const edgeGrad = ctx.createRadialGradient(x, y, radius * 0.9, x, y, radius);
  edgeGrad.addColorStop(0, 'rgba(100,180,255,0)');
  edgeGrad.addColorStop(1, 'rgba(100,180,255,0.3)');
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fillStyle = edgeGrad;
  ctx.fill();
}

function drawMoon(x, y, radius) {
  // 月球光晕
  const glow = ctx.createRadialGradient(x, y, radius * 0.5, x, y, radius * 2);
  glow.addColorStop(0, 'rgba(200,200,200,0.1)');
  glow.addColorStop(1, 'rgba(200,200,200,0)');
  ctx.beginPath();
  ctx.arc(x, y, radius * 2, 0, Math.PI * 2);
  ctx.fillStyle = glow;
  ctx.fill();

  // 月球本体
  const moonGrad = ctx.createRadialGradient(x - radius * 0.2, y - radius * 0.2, 0, x, y, radius);
  moonGrad.addColorStop(0, '#c8c8c8');
  moonGrad.addColorStop(0.5, '#a0a0a0');
  moonGrad.addColorStop(0.8, '#808080');
  moonGrad.addColorStop(1, '#505050');
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fillStyle = moonGrad;
  ctx.fill();

  // 陨石坑
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.clip();

  const craters = [
    { cx: -0.2, cy: -0.3, r: 0.12 },
    { cx: 0.3, cy: 0.1, r: 0.15 },
    { cx: -0.1, cy: 0.35, r: 0.08 },
    { cx: 0.15, cy: -0.15, r: 0.1 },
    { cx: -0.35, cy: 0.05, r: 0.09 },
    { cx: 0.05, cy: 0.2, r: 0.07 },
  ];

  craters.forEach(c => {
    const craterGrad = ctx.createRadialGradient(
      x + c.cx * radius, y + c.cy * radius, 0,
      x + c.cx * radius, y + c.cy * radius, c.r * radius
    );
    craterGrad.addColorStop(0, 'rgba(60,60,60,0.6)');
    craterGrad.addColorStop(0.7, 'rgba(80,80,80,0.3)');
    craterGrad.addColorStop(1, 'rgba(160,160,160,0)');
    ctx.beginPath();
    ctx.arc(x + c.cx * radius, y + c.cy * radius, c.r * radius, 0, Math.PI * 2);
    ctx.fillStyle = craterGrad;
    ctx.fill();
  });

  ctx.restore();
}

function drawShip(x, y) {
  ctx.save();
  ctx.translate(x, y);

  const angle = Math.atan2(
    canvas.height / 2 - y,
    canvas.width / 2 - x
  ) + Math.PI / 2;
  ctx.rotate(angle);

  // 飞船主体
  ctx.beginPath();
  ctx.moveTo(0, -18);
  ctx.lineTo(-8, 10);
  ctx.lineTo(-4, 15);
  ctx.lineTo(4, 15);
  ctx.lineTo(8, 10);
  ctx.closePath();

  const shipGrad = ctx.createLinearGradient(-8, 0, 8, 0);
  shipGrad.addColorStop(0, '#888');
  shipGrad.addColorStop(0.3, '#ddd');
  shipGrad.addColorStop(0.5, '#fff');
  shipGrad.addColorStop(0.7, '#ddd');
  shipGrad.addColorStop(1, '#888');
  ctx.fillStyle = shipGrad;
  ctx.fill();
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 1;
  ctx.stroke();

  // 窗户
  ctx.beginPath();
  ctx.arc(0, -5, 3, 0, Math.PI * 2);
  ctx.fillStyle = '#00d4ff';
  ctx.fill();
  ctx.strokeStyle = '#0088aa';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // 机翼
  ctx.beginPath();
  ctx.moveTo(-8, 8);
  ctx.lineTo(-14, 14);
  ctx.lineTo(-8, 12);
  ctx.closePath();
  ctx.fillStyle = '#cc3333';
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(8, 8);
  ctx.lineTo(14, 14);
  ctx.lineTo(8, 12);
  ctx.closePath();
  ctx.fillStyle = '#cc3333';
  ctx.fill();

  ctx.restore();

  // 引擎火焰
  if (thrust > 0) {
    const flameLen = thrust * 0.3 + Math.random() * 5;
    const grad = ctx.createLinearGradient(x, y + 15, x, y + 15 + flameLen);
    grad.addColorStop(0, 'rgba(255,200,50,0.9)');
    grad.addColorStop(0.5, 'rgba(255,100,20,0.6)');
    grad.addColorStop(1, 'rgba(255,50,0,0)');

    ctx.beginPath();
    ctx.moveTo(x - 5, y + 15);
    ctx.quadraticCurveTo(x, y + 15 + flameLen, x + 5, y + 15);
    ctx.fillStyle = grad;
    ctx.fill();
  }
}

function drawParticles(particles) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.02;
    p.r *= 0.98;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color.replace(')', `,${p.life})`).replace('hsl', 'hsla').replace('rgb', 'rgba');
    if (p.color.startsWith('#')) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
    }
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawShipTrail() {
  if (shipTrail.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(shipTrail[0].x, shipTrail[0].y);
  for (let i = 1; i < shipTrail.length; i++) {
    ctx.lineTo(shipTrail[i].x, shipTrail[i].y);
  }
  ctx.strokeStyle = 'rgba(0,212,255,0.15)';
  ctx.lineWidth = 2;
  ctx.stroke();
}

// ============ 主循环 ============
function updatePositions() {
  const W = canvas.width;
  const H = canvas.height;

  // 地球位置 - 始终在左侧
  earthX = W * 0.12;
  earthY = H * 0.5;
  const earthRadius = Math.min(W, H) * 0.1;

  // 月球位置 - 在右侧
  moonX = W * 0.88;
  moonY = H * 0.5;
  const moonRadius = Math.min(W, H) * 0.05;

  // 飞船位置基于任务阶段
  if (missionPhase === 0) {
    // 待机 - 在地球表面
    shipX = earthX + earthRadius * 0.8;
    shipY = earthY - earthRadius * 0.3;
  } else if (missionPhase === 1) {
    // 发射 - 绕地球轨道
    shipOrbitAngle += 0.02;
    shipX = earthX + (earthRadius + 30) * Math.cos(shipOrbitAngle);
    shipY = earthY + (earthRadius + 30) * Math.sin(shipOrbitAngle);
  } else if (missionPhase === 2) {
    // 地月转移
    const t = animationProgress || 0.5;
    const progress = distanceToEarth / 384400;
    shipX = earthX + (moonX - earthX) * progress;
    shipY = earthY + Math.sin(progress * Math.PI) * -100;
    shipOrbitAngle += 0.03;
  } else if (missionPhase === 3) {
    // 接近月球
    const progress = 1 - (distanceToMoon / 384400);
    shipX = moonX - (moonX - earthX) * (1 - progress) * 0.15;
    shipY = moonY + Math.sin(progress * Math.PI) * -80;
  } else if (missionPhase === 4) {
    // 月球表面
    shipX = moonX - moonRadius * 0.6;
    shipY = moonY + moonRadius * 0.8;
  } else if (missionPhase === 5) {
    // 离开月球
    const progress = distanceToMoon / 384400;
    shipX = moonX + (earthX - moonX) * progress;
    shipY = moonY + Math.sin(progress * Math.PI) * 80;
  } else if (missionPhase === 6) {
    // 返回地球
    const progress = 1 - (distanceToEarth / 384400);
    shipX = moonX + (earthX - moonX) * progress;
    shipY = moonY + Math.sin(progress * Math.PI) * -60;
  } else {
    // 再入完成
    shipX = earthX + earthRadius * 0.8;
    shipY = earthY + earthRadius * 0.3;
  }

  shipTrail.push({ x: shipX, y: shipY });
  if (shipTrail.length > 200) shipTrail.shift();

  return { earthX, earthY, earthRadius, moonX, moonY, moonRadius };
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 深空背景
  const bgGrad = ctx.createRadialGradient(
    canvas.width * 0.3, canvas.height * 0.5, 0,
    canvas.width * 0.5, canvas.height * 0.5, canvas.width * 0.8
  );
  bgGrad.addColorStop(0, '#0a0a1a');
  bgGrad.addColorStop(0.5, '#050510');
  bgGrad.addColorStop(1, '#020208');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 星云
  ctx.save();
  ctx.globalAlpha = 0.03;
  const nebulaGrad = ctx.createRadialGradient(
    canvas.width * 0.7, canvas.height * 0.3, 0,
    canvas.width * 0.7, canvas.height * 0.3, canvas.width * 0.4
  );
  nebulaGrad.addColorStop(0, '#4a0080');
  nebulaGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = nebulaGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.restore();

  drawStars();
  drawMeteors();

  const pos = updatePositions();

  // 绘制连线（地球-月球轨道）
  ctx.beginPath();
  ctx.setLineDash([5, 10]);
  ctx.moveTo(pos.earthX, pos.earthY);
  ctx.lineTo(pos.moonX, pos.moonY);
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.setLineDash([]);

  drawShipTrail();
  drawEarth(pos.earthX, pos.earthY, pos.earthRadius);
  drawMoon(pos.moonX, pos.moonY, pos.moonRadius);
  drawShip(shipX, shipY);

  drawParticles(flameParticles);
  drawParticles(reentryParticles);

  // 标签
  ctx.font = '12px Courier New';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.textAlign = 'center';
  ctx.fillText('🌍 地球', pos.earthX, pos.earthY + pos.earthRadius + 20);
  ctx.fillText('🌙 月球', pos.moonX, pos.moonY + pos.moonRadius + 20);

  // 飞船信息
  if (missionPhase > 0 && missionPhase < 7) {
    ctx.font = '10px Courier New';
    ctx.fillStyle = 'rgba(0,212,255,0.6)';
    ctx.fillText(`v=${speed.toFixed(1)}km/s`, shipX, shipY - 25);
  }
}

function gameLoop() {
  missionElapsed = Date.now() - missionStartTime;
  oxygen -= 0.001;
  temperature += (21 - temperature) * 0.001;

  updateData();
  render();
  requestAnimationFrame(gameLoop);
}

// 初始化
updatePhaseIndicator();
updateButtons();
gameLoop();

// 键盘快捷键
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key === ' ' || key === 'enter') {
    e.preventDefault();
    if (missionPhase === 0) startMission();
    else if (missionPhase === 1) enterEarthOrbit();
    else if (missionPhase === 2) transLunarInjection();
    else if (missionPhase === 3) lunarLanding();
    else if (missionPhase === 4) lunarExplore();
    else if (missionPhase === 5) transEarthInjection();
    else if (missionPhase === 6) earthReentry();
  }
});
</script>
