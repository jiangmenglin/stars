<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太阳-地球-月球运行系统 — 季节变化原理演示</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000010;
    overflow: hidden;
    font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
    color: #e0e0e0;
    user-select: none;
    -webkit-user-select: none;
    height: 100vh;
    width: 100vw;
  }

  #canvas-container {
    position: fixed;
    inset: 0;
    z-index: 1;
  }
  canvas { display: block; }

  #ui-layer {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
  }
  #ui-layer > * {
    pointer-events: auto;
  }

  /* 标题 */
  #title {
    position: absolute;
    top: 20px;
    left: 24px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: #ffffff;
    text-shadow: 0 0 20px rgba(255,200,100,0.4);
  }
  #title span {
    font-weight: 400;
    font-size: 14px;
    opacity: 0.7;
    margin-left: 10px;
  }

  /* 信息面板 */
  #info-panel {
    position: absolute;
    top: 80px;
    right: 24px;
    width: 260px;
    background: rgba(10,12,30,0.85);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 20px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  #season-icon {
    font-size: 48px;
    text-align: center;
    line-height: 1;
    margin-bottom: 6px;
  }
  #season-name {
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    color: #ffd54f;
    margin-bottom: 4px;
  }
  #season-date {
    font-size: 12px;
    text-align: center;
    color: #888;
    margin-bottom: 12px;
  }
  #season-desc {
    font-size: 13px;
    line-height: 1.7;
    color: #bbb;
  }
  #season-desc b {
    color: #ffab40;
  }
  #north-south {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    justify-content: space-between;
    font-size: 12px;
  }
  .hemi-label { color: #888; }
  .north-season { color: #ff8a65; font-weight: 600; }
  .south-season { color: #64b5f6; font-weight: 600; }

  /* 底部控制栏 */
  #controls {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(10,12,30,0.8);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 40px;
    padding: 10px 24px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  #controls button {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06);
    color: #ccc;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #controls button:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.4);
    color: #fff;
  }
  #controls button.active {
    background: rgba(255,180,60,0.25);
    border-color: rgba(255,180,60,0.6);
    color: #ffb83c;
  }
  #speed-label {
    font-size: 13px;
    color: #aaa;
    min-width: 48px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100px;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.15);
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #ffb83c;
    border: 2px solid #000;
    cursor: pointer;
  }

  /* 图例提示 */
  #legend {
    position: absolute;
    bottom: 110px;
    left: 24px;
    font-size: 11px;
    color: #666;
    line-height: 1.6;
  }
  #legend span {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }
  .dot-summer { background: #ff7043; }
  .dot-winter { background: #42a5f5; }
  .dot-equinox { background: #66bb6a; }

  /* 响应式 */
  @media (max-width: 640px) {
    #info-panel {
      width: 220px;
      top: 70px;
      right: 8px;
      padding: 14px;
      font-size: 12px;
    }
    #info-panel #season-icon { font-size: 36px; }
    #info-panel #season-name { font-size: 17px; }
    #controls {
      gap: 8px;
      padding: 8px 16px;
    }
    #controls button { width: 32px; height: 32px; font-size: 14px; }
    input[type="range"] { width: 60px; }
    #title { font-size: 17px; top: 12px; left: 12px; }
    #legend { bottom: 100px; left: 12px; font-size: 10px; }
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui-layer">
  <div id="title">☀️ 太阳 · 地球 · 月球<span>— 季节变化原理</span></div>

  <div id="info-panel">
    <div id="season-icon">☀️</div>
    <div id="season-name">夏至</div>
    <div id="season-date">6月21日前后</div>
    <div id="season-desc">
      北半球<b>夏至</b>——太阳直射北回归线(23.5°N)。北半球日照时间最长，接收的太阳辐射最多，进入夏季。
    </div>
    <div id="north-south">
      <div><span class="hemi-label">北半球</span> <span class="north-season">☀️ 夏季</span></div>
      <div><span class="hemi-label">南半球</span> <span class="south-season">❄️ 冬季</span></div>
    </div>
  </div>

  <div id="legend">
    <span class="dot-summer"></span> 夏至 (北半球夏季开始)<br>
    <span class="dot-equinox"></span> 春/秋分<br>
    <span class="dot-winter"></span> 冬至 (北半球冬季开始)
  </div>

  <div id="controls">
    <button id="btn-slower" title="减速">⏪</button>
    <button id="btn-pause" title="暂停 / 播放">⏯️</button>
    <button id="btn-faster" title="加速">⏩</button>
    <input type="range" id="speed-slider" min="0" max="100" value="30" title="轨道速度">
    <span id="speed-label">1×</span>
    <button id="btn-top-view" title="俯视轨道平面">⬆</button>
    <button id="btn-reset" title="重置视角">🔄</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ───────────────────────── 常量 ─────────────────────────
const ORBIT_RADIUS = 14;
const SUN_RADIUS = 2.8;
const EARTH_RADIUS = 0.75;
const MOON_ORBIT_RADIUS = 2.2;
const MOON_RADIUS = 0.2;
const AXIAL_TILT = 23.44 * (Math.PI / 180); // 23.44° → radians
const BASE_ORBIT_PERIOD = 22; // 基准速度下，一个轨道周期 = 22 秒

// ───────────────────────── 场景初始化 ─────────────────────────
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.5, 200);
camera.position.set(8, 12, 22);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);
controls.minDistance = 6;
controls.maxDistance = 60;
controls.maxPolarAngle = Math.PI * 0.85;
controls.update();

// ───────────────────────── 光照 ─────────────────────────
const ambientLight = new THREE.AmbientLight(0x112244, 0.8);

const sunLight = new THREE.PointLight(0xfff8e8, 50, 80, 0.3);
sunLight.position.set(0, 0, 0);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 1024;
sunLight.shadow.mapSize.height = 1024;
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 80;
sunLight.shadow.bias = -0.0001;

scene.add(ambientLight, sunLight);

// ───────────────────────── 星空背景 ─────────────────────────
const starsGeo = new THREE.BufferGeometry();
const starsCount = 1800;
const starsPositions = new Float32Array(starsCount * 3);
for (let i = 0; i < starsCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 55 + Math.random() * 25;
  starsPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
  starsPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  starsPositions[i * 3 + 2] = r * Math.cos(phi);
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true, opacity: 0.8 });
const stars = new THREE.Points(starsGeo, starsMat);
scene.add(stars);

// ───────────────────────── 太阳 ─────────────────────────
const sunGeo = new THREE.SphereGeometry(SUN_RADIUS, 64, 64);
const sunMat = new THREE.MeshBasicMaterial({ color: 0xffdd44 });
const sunMesh = new THREE.Mesh(sunGeo, sunMat);
scene.add(sunMesh);

// 太阳光晕 — 多层叠加
function createGlow(radius, color, opacity) {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 256;
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
  gradient.addColorStop(0, color);
  gradient.addColorStop(0.15, color);
  gradient.addColorStop(0.4, color);
  gradient.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 256, 256);
  const texture = new THREE.CanvasTexture(canvas);
  const spriteMat = new THREE.SpriteMaterial({
    map: texture,
    blending: THREE.AdditiveBlending,
    transparent: true,
    opacity: opacity,
    depthWrite: false
  });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set(radius, radius, 1);
  return sprite;
}

const glow1 = createGlow(SUN_RADIUS * 5, 'rgba(255,180,30,1)', 0.5);
const glow2 = createGlow(SUN_RADIUS * 8, 'rgba(255,120,20,1)', 0.25);
const glow3 = createGlow(SUN_RADIUS * 12, 'rgba(255,80,10,1)', 0.12);
sunMesh.add(glow1, glow2, glow3);

// ───────────────────────── 轨道环 ─────────────────────────
function createOrbitRing(radius, color, opacity) {
  const ringGeo = new THREE.TorusGeometry(radius, 0.06, 16, 200);
  const ringMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity, depthWrite: false });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  return ring;
}
const earthOrbitRing = createOrbitRing(ORBIT_RADIUS, 0x445566, 0.35);
scene.add(earthOrbitRing);

// ───────────────────────── 文字标签辅助函数 ─────────────────────────
function createLabelSprite(text, fontSize, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 512;
  canvas.height = 192;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = color;
  ctx.font = `bold ${fontSize}px "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 256, 96);
  const texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;
  const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthWrite: false, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(4, 1.5, 1);
  return sprite;
}

// ───────────────────────── 季节标记 ─────────────────────────
// orbitAngle=0 → 夏至, π/2→秋分, π→冬至, 3π/2→春分
const seasonMarkers = [];
const seasonDefs = [
  { angle: 0,                 label: '夏至 ☀️',  color: '#ff7043', desc: '6月21日·北半球夏季', dotColor: 0xff7043 },
  { angle: Math.PI / 2,      label: '秋分 🍂',  color: '#66bb6a', desc: '9月23日·北半球秋季', dotColor: 0x66bb6a },
  { angle: Math.PI,           label: '冬至 ❄️',  color: '#42a5f5', desc: '12月22日·北半球冬季', dotColor: 0x42a5f5 },
  { angle: Math.PI * 1.5,    label: '春分 🌸',  color: '#ef5350', desc: '3月20日·北半球春季', dotColor: 0xef5350 },
];

seasonDefs.forEach(def => {
  const x = ORBIT_RADIUS * Math.cos(def.angle);
  const z = ORBIT_RADIUS * Math.sin(def.angle);

  // 彩色圆点
  const dotGeo = new THREE.SphereGeometry(0.25, 16, 16);
  const dotMat = new THREE.MeshBasicMaterial({ color: def.dotColor });
  const dot = new THREE.Mesh(dotGeo, dotMat);
  dot.position.set(x, 0, z);
  scene.add(dot);

  // 文字标签
  const sprite = createLabelSprite(def.label, 48, def.color);
  sprite.position.set(x, 1.6, z);
  scene.add(sprite);

  seasonMarkers.push({ dot, sprite, def, x, z });
});

// ───────────────────────── 地球系统 ─────────────────────────
const earthPositionGroup = new THREE.Group(); // 用于设置轨道位置
scene.add(earthPositionGroup);

const earthTiltGroup = new THREE.Group();
earthTiltGroup.rotation.z = AXIAL_TILT; // 轴倾斜 23.44° 向 +X 方向
earthPositionGroup.add(earthTiltGroup);

// 地球球体
const earthGeo = new THREE.SphereGeometry(EARTH_RADIUS, 64, 48);

// 程序化地球纹理
const texCanvas = document.createElement('canvas');
texCanvas.width = 512;
texCanvas.height = 256;
const tctx = texCanvas.getContext('2d');

// 海洋底色
tctx.fillStyle = '#2255aa';
tctx.fillRect(0, 0, 512, 256);

// 简化大陆形状
tctx.fillStyle = '#44aa44';
tctx.beginPath(); tctx.ellipse(130, 100, 80, 60, 0.1, 0, Math.PI * 2); tctx.fill(); // 非洲欧洲
tctx.beginPath(); tctx.ellipse(350, 80, 70, 90, 0, 0, Math.PI * 2); tctx.fill();   // 北美
tctx.beginPath(); tctx.ellipse(160, 180, 40, 50, 0, 0, Math.PI * 2); tctx.fill();   // 南美
tctx.beginPath(); tctx.ellipse(420, 140, 55, 60, 0.2, 0, Math.PI * 2); tctx.fill();  // 东亚
tctx.beginPath(); tctx.ellipse(400, 200, 35, 30, 0, 0, Math.PI * 2); tctx.fill();    // 澳大利亚
tctx.fillStyle = '#338833';
tctx.beginPath(); tctx.ellipse(200, 60, 60, 40, -0.2, 0, Math.PI * 2); tctx.fill();  // 欧洲
tctx.beginPath(); tctx.ellipse(300, 100, 30, 80, 0, 0, Math.PI * 2); tctx.fill();   // 中北美

// 极地冰盖
tctx.fillStyle = '#f0f8ff';
tctx.fillRect(0, 0, 512, 22);
tctx.fillRect(0, 234, 512, 22);

// 云层效果
tctx.fillStyle = 'rgba(255,255,255,0.12)';
for (let i = 0; i < 60; i++) {
  const cx = Math.random() * 512;
  const cy = 30 + Math.random() * 196;
  tctx.beginPath();
  tctx.ellipse(cx, cy, 15 + Math.random() * 25, 5 + Math.random() * 10, Math.random() * Math.PI, 0, Math.PI * 2);
  tctx.fill();
}

const earthTex = new THREE.CanvasTexture(texCanvas);
earthTex.colorSpace = THREE.SRGBColorSpace;

const earthMat = new THREE.MeshStandardMaterial({
  map: earthTex,
  roughness: 0.65,
  metalness: 0.05,
});
const earthMesh = new THREE.Mesh(earthGeo, earthMat);
earthMesh.castShadow = true;
earthMesh.receiveShadow = true;
earthTiltGroup.add(earthMesh);

// 赤道环
const equatorGeo = new THREE.TorusGeometry(EARTH_RADIUS * 1.01, 0.03, 8, 64);
const equatorMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5, depthWrite: false });
const equatorRing = new THREE.Mesh(equatorGeo, equatorMat);
equatorRing.rotation.x = Math.PI / 2;
earthTiltGroup.add(equatorRing);

// 自转轴指示线
const axisLen = EARTH_RADIUS * 1.6;
const axisGeo = new THREE.CylinderGeometry(0.04, 0.04, axisLen * 2, 8);
const axisMat = new THREE.MeshBasicMaterial({ color: 0xffcc80, transparent: true, opacity: 0.7, depthWrite: false });
const axisLine = new THREE.Mesh(axisGeo, axisMat);
earthTiltGroup.add(axisLine);

// 北极点小球
const poleGeo = new THREE.SphereGeometry(0.07, 8, 8);
const northPole = new THREE.Mesh(poleGeo, new THREE.MeshBasicMaterial({ color: 0xffffff }));
northPole.position.y = axisLen;
earthTiltGroup.add(northPole);
const southPole = new THREE.Mesh(poleGeo, new THREE.MeshBasicMaterial({ color: 0x888888 }));
southPole.position.y = -axisLen;
earthTiltGroup.add(southPole);

// ───────────────────────── 月球系统 ─────────────────────────
const moonOrbitPivot = new THREE.Group();
earthPositionGroup.add(moonOrbitPivot); // 在黄道面（非倾斜组内）绕地球转

const moonGeo = new THREE.SphereGeometry(MOON_RADIUS, 32, 32);
const moonMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.8, metalness: 0.01 });
const moonMesh = new THREE.Mesh(moonGeo, moonMat);
moonMesh.position.x = MOON_ORBIT_RADIUS;
moonMesh.castShadow = true;
moonMesh.receiveShadow = true;
moonOrbitPivot.add(moonMesh);

// 月球轨道环
const moonOrbitRingGeo = new THREE.TorusGeometry(MOON_ORBIT_RADIUS, 0.03, 8, 64);
const moonOrbitRing = new THREE.Mesh(moonOrbitRingGeo, new THREE.MeshBasicMaterial({
  color: 0x555555, transparent: true, opacity: 0.4, depthWrite: false
}));
moonOrbitRing.rotation.x = Math.PI / 2;
moonOrbitPivot.add(moonOrbitRing);

// ───────────────────────── 状态变量 ─────────────────────────
let orbitAngle = 0;           // 地球公转角（弧度）
let moonAngle = Math.PI * 0.7;
let earthRotation = 0;
let speedMultiplier = 1;
let paused = false;
let clock = new THREE.Clock();

// 速度曲线映射（让滑块体验更好）
function sliderToSpeed(v) {
  // v: 0-100, 映射到 0.1x - 12x，曲线更平滑
  const t = v / 100;
  return 0.1 + t * t * 11.9; // 二次曲线：低端精细，高端快速
}

// ───────────────────────── 季节判定 ─────────────────────────
function getSeasonInfo(angle) {
  // 标准化到 [0, 2π)
  let a = angle % (Math.PI * 2);
  if (a < 0) a += Math.PI * 2;

  if (a < Math.PI / 4 || a >= Math.PI * 7 / 4) {
    return { name: '夏至 ☀️', date: '6月21日前后', icon: '☀️',
      desc: '北半球<b>夏至</b>——太阳直射北回归线(23.5°N)。<br>北半球日照时间最长，接收的太阳辐射最多，进入<b>夏季</b>。北极圈内出现<b>极昼</b>现象。',
      north: '☀️ 夏季', south: '❄️ 冬季' };
  } else if (a >= Math.PI / 4 && a < Math.PI * 3 / 4) {
    return { name: '秋分 🍂', date: '9月23日前后', icon: '🍂',
      desc: '北半球<b>秋分</b>——太阳直射赤道。<br>全球昼夜几乎等长。北半球进入<b>秋季</b>，天气转凉。太阳直射点继续南移。',
      north: '🍂 秋季', south: '🌸 春季' };
  } else if (a >= Math.PI * 3 / 4 && a < Math.PI * 5 / 4) {
    return { name: '冬至 ❄️', date: '12月22日前后', icon: '❄️',
      desc: '北半球<b>冬至</b>——太阳直射南回归线(23.5°S)。<br>北半球日照时间最短，接收的太阳辐射最少，进入<b>冬季</b>。北极圈内出现<b>极夜</b>现象。',
      north: '❄️ 冬季', south: '☀️ 夏季' };
  } else {
    return { name: '春分 🌸', date: '3月20日前后', icon: '🌸',
      desc: '北半球<b>春分</b>——太阳再次直射赤道。<br>全球昼夜等长。北半球进入<b>春季</b>，万物复苏。太阳直射点继续北移。',
      north: '🌸 春季', south: '🍂 秋季' };
  }
}

// ───────────────────────── UI 更新 ─────────────────────────
const uiIcon = document.getElementById('season-icon');
const uiName = document.getElementById('season-name');
const uiDate = document.getElementById('season-date');
const uiDesc = document.getElementById('season-desc');
const uiNorth = document.querySelector('.north-season');
const uiSouth = document.querySelector('.south-season');
const speedLabel = document.getElementById('speed-label');
const speedSlider = document.getElementById('speed-slider');

function updateUI() {
  const info = getSeasonInfo(orbitAngle);
  uiIcon.textContent = info.icon;
  uiName.textContent = info.name;
  uiDate.textContent = info.date;
  uiDesc.innerHTML = info.desc;
  uiNorth.innerHTML = info.north;
  uiSouth.innerHTML = info.south;
  speedLabel.textContent = speedMultiplier.toFixed(1) + '×';
}

// ───────────────────────── 动画循环 ─────────────────────────
function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.1);

  if (!paused) {
    const orbitSpeed = (2 * Math.PI / BASE_ORBIT_PERIOD) * speedMultiplier;
    const earthSpinSpeed = orbitSpeed * 24;   // 地球自转 ≈ 24 倍公转速度（视觉上）
    const moonOrbitSpeed = orbitSpeed * 13.37; // 月球约 13.37 圈/年

    orbitAngle += orbitSpeed * dt;
    moonAngle += moonOrbitSpeed * dt;
    earthRotation += earthSpinSpeed * dt;

    // 标准化角度
    orbitAngle = orbitAngle % (Math.PI * 2);
    moonAngle = moonAngle % (Math.PI * 2);
    earthRotation = earthRotation % (Math.PI * 2);
  }

  // 更新地球位置
  earthPositionGroup.position.x = ORBIT_RADIUS * Math.cos(orbitAngle);
  earthPositionGroup.position.z = ORBIT_RADIUS * Math.sin(orbitAngle);

  // 地球自转
  earthMesh.rotation.y = earthRotation;

  // 月球轨道
  moonOrbitPivot.rotation.y = moonAngle;

  // 太阳自转
  sunMesh.rotation.y += (paused ? 0 : 0.3 * dt);

  // 星空微动
  stars.rotation.y += 0.015 * dt;

  // 更新UI（每15帧减少开销）
  if (Math.floor(performance.now() / 250) !== Math.floor((performance.now() - (paused ? 1000 : dt * 1000)) / 250)) {
    updateUI();
  }

  controls.update();
  renderer.render(scene, camera);
}

// ───────────────────────── 事件处理 ─────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

document.getElementById('btn-pause').addEventListener('click', function() {
  paused = !paused;
  this.classList.toggle('active', paused);
  this.textContent = paused ? '▶️' : '⏯️';
});

document.getElementById('btn-slower').addEventListener('click', () => {
  speedMultiplier = Math.max(0.1, speedMultiplier * 0.5);
  speedSlider.value = Math.sqrt((speedMultiplier - 0.1) / 11.9) * 100;
  updateUI();
});

document.getElementById('btn-faster').addEventListener('click', () => {
  speedMultiplier = Math.min(12, speedMultiplier * 2);
  speedSlider.value = Math.sqrt((speedMultiplier - 0.1) / 11.9) * 100;
  updateUI();
});

speedSlider.addEventListener('input', () => {
  speedMultiplier = sliderToSpeed(parseFloat(speedSlider.value));
  updateUI();
});

document.getElementById('btn-top-view').addEventListener('click', () => {
  // 俯视轨道平面
  const targetPos = new THREE.Vector3(0, 28, 0.5);
  const targetLook = new THREE.Vector3(0, 0, 0);

  const startPos = camera.position.clone();
  const startTarget = controls.target.clone();
  const startTime = performance.now();
  const duration = 800;

  function animCam(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1.0);
    // easeInOutCubic
    const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

    camera.position.lerpVectors(startPos, targetPos, ease);
    controls.target.lerpVectors(startTarget, targetLook, ease);
    controls.update();

    if (t < 1) {
      requestAnimationFrame(animCam);
    }
  }
  requestAnimationFrame(animCam);
});

document.getElementById('btn-reset').addEventListener('click', () => {
  const startPos = camera.position.clone();
  const startTarget = controls.target.clone();
  const targetPos = new THREE.Vector3(8, 12, 22);
  const targetLook = new THREE.Vector3(0, 0, 0);
  const startTime = performance.now();
  const duration = 800;

  function animCam(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1.0);
    const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

    camera.position.lerpVectors(startPos, targetPos, ease);
    controls.target.lerpVectors(startTarget, targetLook, ease);
    controls.update();

    if (t < 1) {
      requestAnimationFrame(animCam);
    }
  }
  requestAnimationFrame(animCam);
});

// 键盘控制
window.addEventListener('keydown', (e) => {
  switch(e.key.toLowerCase()) {
    case ' ': e.preventDefault(); document.getElementById('btn-pause').click(); break;
    case 'arrowleft': speedMultiplier = Math.max(0.1, speedMultiplier * 0.5); speedSlider.value = Math.sqrt((speedMultiplier - 0.1) / 11.9) * 100; updateUI(); break;
    case 'arrowright': speedMultiplier = Math.min(12, speedMultiplier * 2); speedSlider.value = Math.sqrt((speedMultiplier - 0.1) / 11.9) * 100; updateUI(); break;
    case 't': document.getElementById('btn-top-view').click(); break;
    case 'r': document.getElementById('btn-reset').click(); break;
  }
});

// ───────────────────────── 启动 ─────────────────────────
speedSlider.value = 30; // ≈ 1x
speedMultiplier = sliderToSpeed(30);
updateUI();
animate();
</script>
</body>
</html>
