<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>日地月系统 - 纯净版</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
            background-color: black;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 12px 20px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 100;
            border-left: 4px solid #ffaa00;
            backdrop-filter: blur(5px);
        }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #aaa;
            background: rgba(20,20,20,0.5);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(5px);
        }
        #status {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ddd;
            background: rgba(0,0,0,0.6);
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: none;
            z-index: 100;
            text-align: right;
            border-right: 4px solid #3399ff;
            backdrop-filter: blur(5px);
        }
        #note {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #888;
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            pointer-events: none;
            z-index: 100;
        }
    </style>
    <!-- 引入 Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">
        <h1>☀️ 日地月系统 🌍🌕</h1>
        <p>地月绕共同质心 · 整体绕太阳公转</p>
    </div>
    <div id="status">
        <div>月相角: <span id="phase-angle">0.0</span>°</div>
        <div>地月距离: <span id="distance">384.4</span> 千公里</div>
        <div>日地距离: <span id="sun-earth-dist">149.6</span> 百万公里</div>
    </div>
    <div id="controls-hint">
        🖱️ 鼠标拖动/滚轮 · 右键平移
    </div>
    <div id="note">
        ⚡ 非真实比例(为可视化) · 纹理: NASA Visible Earth / SDO
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        // 不再需要 CSS2DRenderer
        
        // --- 初始化场景 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        
        // --- 渲染器 ---
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // --- 相机 ---
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 35);
        camera.lookAt(0, 0, 0);
        
        // --- 轨道控制器 ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0, 0);
        controls.maxPolarAngle = Math.PI / 1.8;
        
        // --- 光照 (太阳作为主光源) ---
        scene.add(new THREE.AmbientLight(0x404060, 0.2));
        
        const sunLight = new THREE.PointLight(0xffdd99, 2.5, 0, 0);
        sunLight.position.set(0, 0, 0);
        scene.add(sunLight);
        
        const fillLight = new THREE.DirectionalLight(0x557799, 0.3);
        fillLight.position.set(10, 20, 5);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0x446688, 0.2);
        backLight.position.set(-20, 10, -20);
        scene.add(backLight);
        
        // --- 星空背景 ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 6000;
        const starsPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            const r = 300 + Math.random() * 500;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            starsPositions[i] = Math.sin(phi) * Math.cos(theta) * r;
            starsPositions[i+1] = Math.sin(phi) * Math.sin(theta) * r;
            starsPositions[i+2] = Math.cos(phi) * r;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 0.35, transparent: true});
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);
        
        // 移除了 GridHelper
        
        // --- 常量定义 (可视化缩放) ---
        const SUN_RADIUS = 3.5;
        const EARTH_RADIUS = 1.2;
        const MOON_RADIUS = 0.5;
        const EARTH_ORBIT_RADIUS = 14.0;
        const MOON_ORBIT_RADIUS = 4.2;
        const EARTH_BARY_OFFSET = 0.35;
        
        const INCLINATION = 0.18;
        const EARTH_AXIS_TILT = 0.41;
        
        const EARTH_YEAR_SPEED = 0.25;
        const MOON_MONTH_SPEED = 3.2;
        
        // --- 纹理加载器 ---
        const loader = new THREE.TextureLoader();
        
        // 太阳
        const sunMap = loader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
        const sunMaterial = new THREE.MeshStandardMaterial({
            map: sunMap,
            color: 0xffaa33,
            emissive: 0xff5500,
            emissiveIntensity: 1.2,
            roughness: 0.5,
        });
        const sun = new THREE.Mesh(new THREE.SphereGeometry(SUN_RADIUS, 64, 64), sunMaterial);
        scene.add(sun);
        
        const sunGlowMaterial = new THREE.MeshPhongMaterial({
            color: 0xff8822,
            transparent: true,
            opacity: 0.25,
            emissive: 0xff6600,
            side: THREE.BackSide
        });
        const sunGlow = new THREE.Mesh(new THREE.SphereGeometry(SUN_RADIUS * 1.15, 32, 32), sunGlowMaterial);
        sun.add(sunGlow);
        
        // 地球
        const earthMap = loader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
        const earthSpecularMap = loader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');
        const earthNormalMap = loader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
        const cloudMap = loader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');
        
        const earthMaterial = new THREE.MeshPhongMaterial({
            map: earthMap,
            specularMap: earthSpecularMap,
            specular: new THREE.Color('grey'),
            shininess: 10,
            normalMap: earthNormalMap,
            normalScale: new THREE.Vector2(1.5, 1.5),
        });
        const earth = new THREE.Mesh(new THREE.SphereGeometry(EARTH_RADIUS, 64, 64), earthMaterial);
        
        const cloudMaterial = new THREE.MeshPhongMaterial({
            map: cloudMap,
            transparent: true,
            opacity: 0.4,
            blending: THREE.AdditiveBlending,
            side: THREE.DoubleSide
        });
        const cloudMesh = new THREE.Mesh(new THREE.SphereGeometry(EARTH_RADIUS * 1.01, 64, 64), cloudMaterial);
        earth.add(cloudMesh);
        
        earth.rotation.x = -0.15;
        earth.rotation.y = 2.5;
        earth.rotation.z = EARTH_AXIS_TILT;
        
        // 月球
        const moonMap = loader.load('https://threejs.org/examples/textures/planets/moon_1024.jpg');
        const moonMaterial = new THREE.MeshStandardMaterial({
            map: moonMap,
            roughness: 0.8,
            metalness: 0.1,
        });
        const moon = new THREE.Mesh(new THREE.SphereGeometry(MOON_RADIUS, 48, 48), moonMaterial);
        
        // --- 轨道线 ---
        const earthOrbitPoints = [];
        const segments = 128;
        for (let i = 0; i <= segments; i++) {
            const angle = (i / segments) * Math.PI * 2;
            const x = EARTH_ORBIT_RADIUS * Math.cos(angle);
            const z = EARTH_ORBIT_RADIUS * Math.sin(angle);
            earthOrbitPoints.push(new THREE.Vector3(x, 0, z));
        }
        const earthOrbitGeo = new THREE.BufferGeometry().setFromPoints(earthOrbitPoints);
        const earthOrbitLine = new THREE.LineLoop(earthOrbitGeo, new THREE.LineBasicMaterial({ color: 0x88aaff }));
        scene.add(earthOrbitLine);
        
        const moonOrbitPoints = [];
        for (let i = 0; i <= segments; i++) {
            const angle = (i / segments) * Math.PI * 2;
            const x = MOON_ORBIT_RADIUS * Math.cos(angle);
            const y = MOON_ORBIT_RADIUS * Math.sin(angle) * Math.sin(INCLINATION);
            const z = MOON_ORBIT_RADIUS * Math.sin(angle) * Math.cos(INCLINATION);
            moonOrbitPoints.push(new THREE.Vector3(x, y, z));
        }
        const moonOrbitGeo = new THREE.BufferGeometry().setFromPoints(moonOrbitPoints);
        const moonOrbitLine = new THREE.LineLoop(moonOrbitGeo, new THREE.LineBasicMaterial({ color: 0xcccccc }));
        
        // 质心标记
        const barycenterMarker = new THREE.Mesh(
            new THREE.SphereGeometry(0.12, 8, 8),
            new THREE.MeshBasicMaterial({ color: 0xffaa00 })
        );
        
        // 连线
        const lineMaterial = new THREE.LineBasicMaterial({ color: 0x88aacc, transparent: true, opacity: 0.3 });
        const earthLineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,0)]);
        const moonLineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,0)]);
        const earthLine = new THREE.Line(earthLineGeo, lineMaterial);
        const moonLine = new THREE.Line(moonLineGeo, lineMaterial);
        
        scene.add(earth);
        scene.add(moon);
        scene.add(barycenterMarker);
        scene.add(earthLine);
        scene.add(moonLine);
        scene.add(moonOrbitLine);
        
        const baryOrbitIndicator = new THREE.Mesh(
            new THREE.SphereGeometry(0.15, 6, 6),
            new THREE.MeshBasicMaterial({ color: 0xffaa00 })
        );
        scene.add(baryOrbitIndicator);
        
        // 移除了所有 CSS2DObject 标签
        
        // --- 动画变量 ---
        let clock = new THREE.Clock();
        
        function updateUI(phaseDeg, distanceKm, sunEarthDist) {
            document.getElementById('phase-angle').textContent = phaseDeg.toFixed(1);
            document.getElementById('distance').textContent = distanceKm.toFixed(1);
            document.getElementById('sun-earth-dist').textContent = sunEarthDist.toFixed(1);
        }
        
        // --- 动画循环 ---
        function animate() {
            const delta = clock.getDelta();
            const elapsedTime = performance.now() * 0.001;
            
            const earthOrbitAngle = elapsedTime * EARTH_YEAR_SPEED;
            const baryX = EARTH_ORBIT_RADIUS * Math.cos(earthOrbitAngle);
            const baryZ = EARTH_ORBIT_RADIUS * Math.sin(earthOrbitAngle);
            const baryPos = new THREE.Vector3(baryX, 0, baryZ);
            
            barycenterMarker.position.copy(baryPos);
            baryOrbitIndicator.position.copy(baryPos);
            
            const moonAngle = elapsedTime * MOON_MONTH_SPEED;
            const moonOffsetX = MOON_ORBIT_RADIUS * Math.cos(moonAngle);
            const moonOffsetY = MOON_ORBIT_RADIUS * Math.sin(moonAngle) * Math.sin(INCLINATION);
            const moonOffsetZ = MOON_ORBIT_RADIUS * Math.sin(moonAngle) * Math.cos(INCLINATION);
            const moonOffset = new THREE.Vector3(moonOffsetX, moonOffsetY, moonOffsetZ);
            
            const earthDir = moonOffset.clone().normalize().negate();
            const earthOffset = earthDir.multiplyScalar(EARTH_BARY_OFFSET);
            const earthPos = baryPos.clone().add(earthOffset);
            const moonPos = baryPos.clone().add(moonOffset);
            
            earth.position.copy(earthPos);
            moon.position.copy(moonPos);
            
            moonOrbitLine.position.copy(baryPos);
            
            const pointsEarthLine = [baryPos.clone(), earthPos.clone()];
            earthLine.geometry.dispose();
            earthLine.geometry = new THREE.BufferGeometry().setFromPoints(pointsEarthLine);
            
            const pointsMoonLine = [baryPos.clone(), moonPos.clone()];
            moonLine.geometry.dispose();
            moonLine.geometry = new THREE.BufferGeometry().setFromPoints(pointsMoonLine);
            
            earth.rotation.y += 0.005;
            if (earth.children[0] instanceof THREE.Mesh) {
                earth.children[0].rotation.y += 0.002;
            }
            
            moon.lookAt(earthPos);
            moon.rotateY(Math.PI);
            
            sun.rotation.y += 0.001;
            
            const sunToEarth = earthPos.clone().sub(sun.position).normalize();
            const earthToMoon = moonPos.clone().sub(earthPos).normalize();
            const dot = earthToMoon.dot(sunToEarth);
            const phaseRad = Math.acos(Math.max(-1, Math.min(1, dot)));
            const phaseDeg = phaseRad * 180 / Math.PI;
            
            const moonDistance = moonPos.distanceTo(earthPos);
            const realMoonDistKm = (moonDistance / MOON_ORBIT_RADIUS) * 384400;
            const sunEarthDist = earthPos.length();
            const realSunEarthDistKm = (sunEarthDist / EARTH_ORBIT_RADIUS) * 149.6;
            
            updateUI(phaseDeg, realMoonDistKm, realSunEarthDistKm);
            
            stars.rotation.y += 0.0001;
            
            controls.update();
            
            renderer.render(scene, camera);
            
            requestAnimationFrame(animate);
        }
        
        animate();
        
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        moon.rotation.y = 0.5;
        
        console.log('日地月系统模拟 (无网格/标签) 已启动');
    </script>
</body>
</html>
